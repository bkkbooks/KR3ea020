body:
  text: 序夫萬物章章以害一生生無不傷矧夫造化為爐陰陽為炭而萬物熔鑄其中凡厥有形奈何而不銷鑠也乎嘗試登泰岱而睹神州躡雲霞而瞻陸海陰陽之所搏激邪逆之所侵傷漭漭泱泱無微不投叢叢林林罔形不攝而加以五毒薄蝕其外七情耗蠹其中精亡於氣竭神敝於魂馳匪金匪石誰為不化之形相刃相劘豈盡有生之數是以單豹修而虎齧張毅走而病攻外內不無重傷修短皆其自取非夫抽玉版之真詮閲靈蘭之祕典抱神守和全真寶命者烏足與談性命之情窺死生之故哉鬍子德甫幼負倜儻之才長嬰鼽衄之疾股甫折而醫良心既齋而道進謂黃帝素問一書為至道之根宗聖神之眇論於是搜厥幽玄標其旨要名為素問心得庶幾佩以終身因可公之同志俾尊生者式為龜鑑濟世者用作梯航抉大道之精微求至人之倣佛淡泊養精清虛養氣寧靜養神使精合於氣氣合於神神合於形以調四序之和以從八風之理夫亦可以抱握陰陽提挈天地斧斤不夭而盡終天年豈必登具茨而問途陟空同而訪道華胥夢悟鼎湖上升乃稱飄飄乎仙哉鬍子妙悟向為余稱道者若此因為述其言而志之虎林林杞楚材撰序醫之書莫先素問醫之人莫善岐黃故視疾為大端斯知醫非小道語有作虀雖儒門之易事世稱全孝誠人子之當知既為疾病所魔不無藥石是賴死生有命燈油可添其浪燃於風前孰若祕藏於室內即卜家之趨避猶玄門之煉修故凡有得於心隨乃鉤出於筆庶幾行得捷徑學有指蒙未必有助於橘井杏林或將小補於沉腰潘鬢其於懲已勝而防未然則又足取也明五運而諳六氣又深有濟焉末由博施試為醫國以此怕之一念充之仁及四方將有舍素問岐黃之資多得心應手之妙矣欲公同志受付梓人時蓋丙申三之氣錢塘胡文煥識於益壽堂
