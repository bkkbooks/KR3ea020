body:
  text: 卷上上古天真論黃帝問曰上古之人春秋皆度百歲而動作不衰今時之人年半百而動作皆衰者時世異耶人將失之耶岐伯對曰上古之人其知道者法於陰陽和於術數飲食有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去今時之人不然也以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也恬淡虛無真氣從之精神內守病安從來帝曰人年老而無子者材力盡邪將天數然也岐伯曰女子七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下故有子三七腎氣平均故真牙生而長極四七筋骨堅髮長極身體盛壯五七陽明脈衰面始焦發始墮六七三陽脈衰於上面皆焦發始白七七任脈虛太衝脈衰少天癸竭地道不通故形壞而無子也丈夫八歲腎氣實髮長齒更二八腎氣盛天癸至精氣溢瀉陰陽和故能有子三八腎氣平均筋骨徑強故真牙生而長極四八筋骨隆盛肌肉滿壯五八腎氣衰發墮齒稿六八陽氣衰竭於上面焦髮鬢頒白七八肝氣衰筋不能動天癸竭精少腎藏衰形體皆極腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉今五臟皆衰筋骨解墮天癸盡矣故髮鬢白身體重行步不正而無子耳帝曰有其年已老而有子者何也岐伯曰此其天壽過度氣脈常通而腎氣有餘也此雖有子男不過盡八八女不過盡七七而天地之精氣皆竭矣四氣調神大論春三月此謂發陳天地俱生萬物以榮夜臥早起廣步於庭披髮緩形以使志生生而勿殺子而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒變奉長者少天地氣交萬物華實夜臥早起無厭於日使志無怒使華英成秀使氣得泄若所愛在外此夏氣之應養長之道也逆之則傷心秋為痎瘧奉收者少冬至重病秋三月此謂容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋刑收斂神氣使秋氣平無外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為飧泄奉藏者少冬三月此謂閉藏水冰地坼無擾乎陽早臥晚起必待日光使志若伏若匿若有私意若已有得去寒就溫無泄皮膚使氣亟奪此冬氣之應養藏之道也逆之則傷腎春為痿厥奉生者少逆春氣則少陽不生肝氣不變逆夏則太陽不長心氣內洞逆秋氣則太陰不收肺氣焦滿逆冬氣則少陰不藏腎氣獨沉夫四時陰陽者萬物之根本也所以聖人春夏養陽秋冬養陰以從其根逆其根則伐其本壞其真矣是故聖人不治已病治未病不治已亂治未亂夫病已成而後藥之亂已成而後治之譬猶渴而穿井鬥而鑄錐不亦晚乎生氣通天論春傷於風邪氣留連乃為洞泄夏傷於暑秋為痎瘧秋傷於濕上逆而咳發為痿厥冬傷於寒春必溫病四時之氣更傷五臟味過於酸肝氣以津脾氣乃絶味過於咸夫骨氣勞短肌心氣抑味過於甘心氣喘滿色黑腎氣不衡味過於苦脾氣不濡胃氣乃厚味過於辛筋脈沮弛精神乃央是故謹和五味骨正筋柔氣血以流腠理以密如是則骨氣以精謹道如法長有天命金匱真言論東風生於春病在肝俞在頸項南風生於夏病在心俞在胸脅西風生於秋病在肺俞在肩背北風生於冬病在腎俞在腰股中央為土病在脾俞在脊故春氣者病在頭夏氣者病在臟秋氣者病在肩背冬氣者病在四肢故春善病鼽衄仲夏善病胸脅長夏善病洞泄寒中秋善病風瘧冬善病痹厥故冬不按蹻春不鼽衄春不病頸項仲夏不病胸脅長夏不病洞泄寒中秋不病風瘧冬不病痹厥飧泄而汗出也夫精者身之本也故藏於精者春不病溫夏暑汗不出者秋成風瘧夫言人身之陰陽則背為陽腹為陰言人身之臟府中陰陽則臟者為陰府者為陽肝心脾肺腎五臟皆為陰膽胃大腸小腸膀胱三焦六腑皆為陽冬病在陰夏病在陽春病在陰秋病在陽故背為陽陽中之陽心也背為陽陽中之陰肺也腹為陰陰中之陰腎也腹為陰陰中之陽肝也腹為陰陰中之至陰脾也東方青色入通於肝開竅於目藏精於肝其病發驚駭其味酸其類草木其畜雞其穀麥其應四時上為歲星是以春氣在頭也其音角其數八是以知病之在筋也其臭臊南方赤色入通於心開竅於耳藏精幹心故病在五臟其味苦其類火其畜羊其谷黍其應四時上為熒惑星是以知病之在脈也其音徵其數七其臭焦中央黃色入通於脾開竅於口藏精於脾故病在舌本其味甘其類土其畜牛其谷稷其應四時上為鎮星是以知病之在肉也其音宮其數五其臭香西方白色入通於肺開竅於鼻藏精於肺故病在背其味辛其類金其畜馬其谷稻其應四時上為太白星是以知病之在皮毛也其音商其數九其臭腥北方黑色入通於腎開竅於二陰藏精幹腎故病在溪其味鹹其類水其畜彘其谷豆其應四時上為辰星是以知病之在骨也其音羽其數六其臭腐陰陽應象大論治病必求於本寒極生熱熱極生寒寒氣生濁熱氣生清清氣在下則生飧泄濁氣在上則生䐜脹此陰陽反作病之從逆也清陽出上竅濁陰出下竅清陽發腠理濁陰走五臟清陽實四支濁陰歸六腑水為陰火為陽陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味化生精氣生形味傷形氣傷精精化為氣氣傷於味陰味出下竅陽氣出上竅陰勝則陽病陽勝則陰病陽勝則熱陰勝則寒重寒則熱重熱則寒寒傷形熱傷氣氣傷痛形傷腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡瀉人有五臟化五氣以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽喜怒不節寒暑過度生乃不固冬傷於寒春必病溫春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽東方生風風生木木生酸酸生肝肝生筋筋生心肝主目其在天為玄在人為道在地為化化生五味道生智玄生神神在天為風在地為木在體為筋在藏為肝在色為蒼在音為角在聲為呼在變動為握在竅為目在味為酸在志為怒怒傷肝悲勝怒風傷筋燥勝風酸傷筋辛勝酸南方生熱熱生火火生苦苦生心心生血血生脾心主舌其在天為熱在地為火在體為脈在藏為心在色為赤在音為徵在聲為笑在變動為憂在竅為舌在味為苦在志為喜喜傷心恐勝喜熱傷氣寒勝熱苦傷氣咸勝苦中央生濕濕生土土生甘甘生脾脾生肉肉生肺脾主口其在天為濕在藏為脾在色為黃在音為宮在聲為歌在變動為噦在竅為口在味為甘在志為思思傷脾怒勝思濕傷肉風勝濕甘傷肉酸勝甘西方生燥燥生金辛生肺肺生皮毛皮毛生腎肺主鼻其在天為燥在地為金在體為皮毛在藏為肺在色為白在音為商在聲為哭在變動為咳嗽在竅為鼻在味為辛在志為憂憂傷肺喜勝憂熱傷皮毛寒勝熱苦勝辛北方生寒寒生水水生咸咸生腎腎生骨髓髓生肝腎主耳其在天為寒在地為水在體為骨在藏為腎在色為黑在音為羽在聲為呻在變動為栗在竅為耳在味為咸在志為恐恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸年四十而陰氣自半也起居衰矣年五十體重耳目不聰矣年六十陰痿氣大衰九竅不利下虛上實涕泣俱出矣知之則強不知則老天不足西北故西北方陰也而人右耳目不如左明也地不滿東南故東南方陽也而人左手足不如右強也惟賢人上配天以養頭下象地以養足中傍人事以養五臟天氣通於肺地氣通於嗌風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎六經為川腸胃為海九竅為水注之氣以天地為之陰陽陽之汗以天地之雨名之陽之氣以天地之疾風名之暴氣象雷逆氣象陽邪風之至疾如風雨故善治者治皮毛其次治肌膚其次治筋脈其次治六腑其次治五臟治五臟者半死半生也故天之邪氣感則害人五臟水穀之寒熱感則害於六腑地之濕氣感則害皮肉筋脈善診者察色按脈先別陰陽審清濁而知部分視喘息聽音聲而知所苦觀權衡規矩而知病所主按盡寸觀浮沉滑澀而知病所生以治無過故因其輕而揚之因其重而減之因其衰而彰之形不足者溫之以氣精不足者補之以味其高者因而越之其下者引而竭之中滿者瀉之於內其有邪者清形以為汗其在皮者汗而發之其慓悍者按而收之其實者散而瀉之審其陰陽以別柔剛陽病治陰陰病治陽定其血氣各守其鄉血實宜決之氣虛宜掣引之陰陽離合論聖人南面而立前曰廣明後曰太衝太衝之地名曰少陰少陰之上名曰太陽太陽根起於至陰結於命門名曰陰中之陽中身而上名曰廣明廣明之下名曰太陰太陰之前名曰陽明陽明根起於厲兌名曰陰中之陽厥陰之表名曰少陽少陽根起於竅陰名曰陰中之少陽是故三陽之離合也太陽為開陽明為闔少陽為樞三經者不得相失也搏而勿浮命曰一陽外者為陽內者為陰然則中為陰其衝在下名曰太陰太陰根起於隱白名曰陰中之陰太陰之後名曰少陰少陰根起於湧泉名曰陰中之少陰少陰之前名曰厥陰是故三陰之離合也太陰為開厥陰為闔少陰為樞三經者不得相失也搏而勿沉名曰一陰陰陽別論凡持真脈之藏脈者肝至懸絶急十八日死心至懸絶九日死肺至懸絶十二日死腎至懸絶七日死脾至懸絶四日死三陰俱搏二十日夜半死二陰俱搏十三日夕時死一陰俱搏十日死三陽俱搏且鼓三日死三陰三陽俱搏心腹滿發盡不得隱曲五日死二陽俱搏其病溫死不治不過十日死靈蘭祕典論心者君主之官也神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉脾胃者倉廩之官五味出焉大腸者傳道之官變化出焉小腸者受盛之官化物出焉腎者作強之官伎巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣凡此十二官者不得相失也故主明則下安主不明則十二官危六節藏象論五氣入鼻藏於心肺上使五色修明音聲能彰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生心者生之本神之變也其華在面其充在血脈為陽中之太陽通於夏氣肺者氣之本魄之處也其華在毛其充在皮為陽中之太陰通於秋氣腎者主蟄封藏之本精之處也其華在發其充在骨為陰中之少陰通於冬氣肝者罷極之本魂之居也其華在爪其充在筋以生血氣其味酸其色蒼此為陽中之少陽通於春氣脾胃大腸小腸三焦膀胱者倉廩之本營之居也名曰器能化糟粕轉味而入出者也其華在唇四白其充在肌其味甘其色黃此至陰之類通於土氣凡十一藏取決於膽也故人迎一盛病在少陽二盛病在太陽三盛病在陽明四盛已上為格陽寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛已上為關陰人迎與寸口俱盛四倍已上為關格關格之脈贏不能極於天地之精氣則死矣五臟生成篇心之合脈也其榮色也其主腎也肺之合皮也其榮毛也其主心也肝之合筋也其榮爪也其主肺也脾之合肉也其榮唇也其主肝也腎之合骨也其榮發也其主脾也是故多食鹹則脈凝泣而變色多食苦則皮稿而毛拔多食辛則筋急而爪枯多食酸則肉胝皺而唇揭多食甘則骨痛而發落此五味之所傷也故心欲苦肺欲辛肝欲酸脾欲甘腎欲咸此五味之所合也五臟之氣故色見青如草茲者死黃如枳實者死黑如炲音苔者死赤如衃音坯血者死白如枯骨者死此五色之見死也青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝樓實生於腎如以縞裹紫此五臟所生之外榮也色味當五臟白當肺辛赤當心苦青當肝酸黃當脾甘黑當腎咸故白當皮赤當脈青當筋黃當肉黑當骨諸脈者皆屬於目諸髓者皆屬於腦諸筋者皆屬於節諸血者皆屬於心諸氣者皆屬於肺此四支八溪之朝夕也故人臥血歸於肝肝受血而能視足受血而能步掌受血而能握指受血而能攝臥出而風吹之血凝於膚者為痹凝於脈者為泣凝於足者為厥此三者血行而不得反其空故為痹厥也赤脈之至也喘而堅診曰有積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之白脈之至也喘而浮上虛下實驚有積氣在胃中喘而虛名曰肺痹寒熱得之醉而使內也青脈之至也長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰痛足清頭痛黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四支汗出當風黑脈之至也上堅而大有積氣在小腹與陰名曰腎痹得之沐浴清水而臥凡相五色之奇脈面黃目青面黃目赤面黃目白面黃目黑者皆不死也面青目赤面赤目白面青目黑面黑目白面赤目青皆死也五臟別論腦髓骨脈膽女子胞此六者地氣之所生也皆藏於陰而象於地故藏而不瀉名曰奇恆之府夫胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之府此不能久留輸瀉者也魄門亦為五臟使水穀不能久藏所謂五臟者藏精氣而不瀉也故滿而不能實六腑者傳化物而不藏故實而不能滿也所以然者水穀入口則胃實而腸虛食下則腸實而胃虛故曰實而不滿滿而不實也胃者水穀之海六腑之大源也五味入口藏於胃以養五臟氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口故五氣入鼻藏於心肺心肺有病而鼻為之不利也異法方宜論東方之域天地之所始生也魚鹽之地海濱傍水其民食魚而嗜咸皆安其處美其食魚者使人熱中鹽者勝血故其民皆黑色疏理其病皆為癰瘍其治宜砭石故砭石肝亦從東方來西方者金玉之域沙石之處天地之所收引也其民陵居而多風水土剛強其民不衣而褐薦其民華食而脂肥故邪不能傷其形體其病生於內其治宜毒藥故毒藥者亦從西方來北方肝天地所閉藏之域也其地高陵居風寒冰冽其民樂野處而乳食藏寒生滿病其治宜灸焫故灸焫肝亦從北方來南方者天地所長養陽之所盛處也其地下水土弱霧露之所聚也其民嗜酸而食胕故其民皆致理而赤色其病攣痹其治宜微針故九針者亦從南方來中央者其地平以濕天地之所以生萬物也衆其民食雜而不勞其治宜導引按蹻故其病多痿厥寒熱故導引按蹻者亦從中央出也移精變氣論憂患緣其內苦形傷其外又失四時之從逆寒暑之宜賊風數至虛邪朝夕內至五臟骨髓外傷空竅肌膚所以小病必甚大病必死色以應日脈以應月治之要極無失色脈得神者昌失神者亡湯液醪醴論嗜欲無窮而憂患不止精氣弛壞榮泣衛除故神去之而病不愈也玉版論要容色見上下左右各在其要其色見淺者湯液主治十日已其見深者必齊主治二十一日已其見大深者醪酒主治百日已色夭面脫不治百日盡已脈短氣絶死病溫虛甚死色見上下左右各在其要上為逆下為從女子右為逆左為從男子左為逆右為從易重陽死重陰死診要經終論正月二月天氣始方地氣始發人氣在肝三月四月天氣正方地氣定發人氣在脾五月六月天氣盛地氣高人氣在頭七月八月陰氣始殺人氣在肺九月十月陰氣始冰地氣始閉人氣在心十一月十二月冰復地氣合人氣在腎故春刺散俞及與分理血出而止甚者傳氣間者環也夏刺絡俞見血而止盡氣閉環痛病必下秋刺皮膚循理上下同法神變而止冬刺俞竅於分理甚者直下間者散下凡刺胸腹者必避五臟中心者環死中脾者五日死中腎者七日死中肺者五日死中鬲者皆為傷中其病雖愈不過一歲必死太陽之脈其終也戴眼反折瘛瘲其色白絶汗乃出出則死矣少陽終者耳聾百節皆縱目睘絶系絶系一日半死其死也色先青白乃死矣陽明終者口目動作善驚妄言色黃其上下經盛不仁則終矣少陰終者面黑齒長而垢腹脹閉上下不通而終矣太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通不通則面黑皮毛焦而終矣厥陰終者中熱咽乾善溺心煩甚則舌卷卵上縮而終矣脈要精微論夫脈者血之府也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛渾渾革至如湧泉病進而色弊綿綿其去如弦絶死夫精明五色者氣之華也赤欲如白裹裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如倉璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼五色精微象見矣其壽不久也五臟者中之守也得守者生失守者死夫五臟者身之強也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂俯筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣得強則生失強則死陰盛則夢涉大水恐懼陽盛則夢大火燔灼陰陽俱盛則夢相殺毀傷上盛則夢飛下盛則夢墮甚飽則夢豫甚飢則夢取肝氣盛則夢怒肺氣盛則夢哭短蟲多則夢聚衆長蟲多則夢相擊毀傷是故持脈有道虛靜為保春日浮如魚之遊在波夏日在膚泛泛乎萬物有餘秋日下膚蟄蟲將去冬日在骨蟄蟲周密君子居室心脈搏堅而長當病舌卷不能言其軟而散者當消環自己肺脈搏堅而長當病唾血其軟而散者當病灌汗至今不復散發也肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆其軟而散色澤者當病溢飲溢飲者渴暴多飲而易入肌皮腸胃之外也胃脈搏堅而長其色赤當病拆髀其軟而散者當病食痹脾脈搏堅而長其色黃當病少氣其軟而散色不澤者當病足腫若水狀也腎脈搏堅而長其色黃而赤者當病拆腰其軟而散者當病少血至今不復也徵其脈小色不奪者新病也徵其脈不奪其色奪者此久病也徵其脈與五色俱奪者此久病也徵其脈與五色俱不奪者新病也平人氣象論人一呼脈再動一吸脈亦再動呼吸定息脈五動閏以太息命曰平人平人者不病也肝見庚辛死心壬癸死脾見甲乙死腎見戊已死婦人手少陰脈動甚者妊子也人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真藏脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也太陽脈至洪大以長少陽脈至乍數作疏乍短乍長陽明脈至浮大而短夫平心脈來纍纍如連珠如循琅玕曰心平夏以胃氣為本病心脈來喘喘連屬其中微曲曰心病死心脈來前曲後居如操帶鉤曰心死平肺脈來厭厭聶聶如落榆莢曰肺平秋以胃氣為本病肺脈來不上不下如循雞羽曰肺病死肺脈來如物之浮如風吹毛曰肺死平肝脈來軟弱招招如揭長竿末梢曰肝平春以胃氣為本病肝脈來盈實而滑如循長竿曰肝病死肝脈來急益徑如新張弓弦曰肝死平脾脈來和柔相離如雞踐地曰脾平長夏以胃氣為本病脾脈來實而盈數如雞舉足曰脾病死脾脈來鋭堅如鳥之喙如鳥之距如屋之漏如水之流曰脾死平腎脈來喘喘纍纍如鉤按之而堅曰腎平冬以胃氣為本病腎脈來如引葛按之益堅曰腎病死腎脈來發如奪索辟辟如彈石曰腎死玉機莫藏論春脈者肝也東方木也萬物之所以始生也故其氣來軟弱輕虛而滑端直以長故曰弦反此者病其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中太過則令人善忘忽忽眩冒而巔疾其不及則令人胸痛引背下則兩脅胠滿夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鉤反此者病其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不反病在中太過則令人身熱而膚痛為浸淫其不及則令人煩心上見咳唾下為氣泄秋脈者肺也西方金也萬物之所以收成也故其氣來輕虛以浮來急去散故曰浮反此者病其氣來毛而中央堅兩傍虛此為太過病在外其氣來毛而微此謂不反病在中太過則令人逆氣而背痛慍慍然其不及則令人喘呼吸少氣而咳上氣見血下聞病音冬脈者腎也北方水池萬物之所以合藏也故其氣來沉以搏故曰營反此者病其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中太過則令人解㑊音亦脊脈痛而少氣不欲言其不及則令人心懸如病飢䏚音蒸中清脊中痛少腹滿小便變脾脈者土也孤藏以灌四傍者也其來如水之流者此謂太過病在外如鳥之喙者此謂不及病在中太過則令人四支不舉其不及則令人九竅不通名曰重強肝受氣於心傳之於脾氣舍於腎至肺而死脾受氣於肺傳之於腎氣舍於心至肝而死肺受氣於腎傳之於肝氣舍於脾至心而死腎受氣於肝傳之於心氣舍於肺至脾而死此皆逆死也憂恐悲喜怒令不得以其次故令人有大病矣因而喜大虛則腎氣乘矣怒則肝氣乘矣悲則肺氣乘矣憂則心氣乘矣大骨枯稿大肉陷下胸中氣滿喘息不便其氣動形期六月死真藏脈見乃豫之期日大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項期一月死真藏見乃豫之期日大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破㬷音郡真藏見十月之內死大骨枯稿大肉陷下肩髓肉消動作益衰真藏來見期一歲死見其真藏乃豫之期日大骨枯稿大肉陷下胸中氣滿腹內痛心中不便肩項身熱破㬷脫肉目匡陷真藏見目不見人立死其見人者至其所不勝之時則死急虛身中卒至五臟絶閉脈道不通氣不往來譬於墮溺不可為期其脈絶不來若人一息五六至其形肉不脫真藏雖不見猶死也真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而搏如循薏苡於纍纍然色赤黑不澤毛折乃死真肺脈至大而虛如以毛羽中人膚色白赤不澤毛折乃死真腎脈至搏而絶如指彈石辟辟然色黑黃不澤毛折乃死真脾脈至弱而乍數乍疏色黃青不澤毛折乃死諸真藏脈見者皆死不治也脈逆四時為不可治春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絶沉澀者命曰逆四時虛實以決死生脈盛皮熱腹脹前後不通悶瞀音茂此謂五實脈細皮寒氣少泄利前後飲食不入此謂五虛三部九候論上部天兩額之動脈上部地兩頰之動脈上部人耳前之動脈中部天手太陰也中部地手陽明也中部人手少陰也下部天足厥陰也下部地足少陰也下部人足太陰也故下部之天以候肝地以候腎人以候脾胃之氣中部之天以候肺地以候胸中之氣人以候心上部之天以候頭角之氣地以候口齒之氣人以候耳目之氣神藏五形藏四合為九藏五臟已敗其色必夭夭必死矣必先度其形之肥瘦以調其氣之虛實實則瀉之虛則補之形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死形氣相得者生參伍不調者病三部九候皆相失者死上下左右之脈相應如參舂者病甚上下左右相失不可數者死中部之候雖獨調與衆藏相失者死中部之候相減者死目內陷者死察九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病察其府藏以知死生之期必先知經脈然後知病脈九候之脈皆沉細懸絶者為陰主冬故以夜半死盛躁喘數者為陽主夏故以日中死是故寒熱病者以平旦死熱中及熱病者以日中死病風者以日夕死病水者以夜半死其脈乍疏乍數乍遲乍疾者日乘四季死形肉以脫九候雖調猶死七診雖見九候皆從者不死所言不死者風氣之病及經月之病似七診之病而非也故言不死若有七診之病其脈候亦敗者死矣必審問其所始病而後各切循其脈視其經絡浮沉以上下逆從循之其脈疾者不病其脈遲者病脈不往來者死皮膚著者死經病者治其經孫絡病者治其孫絡血血病身有痛者治其經絡經脈別論夜行則喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心度水跌僕喘出於腎與骨當是之時勇者氣行則已怯者則著而為病也故觀人勇怯骨肉皮膚能知其情以為診法也故飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝體勞苦汗出於脾食氣入胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於府府精神明留於四臟氣歸於權衡權衡以平氣口成寸以決死生飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也藏氣法時論肝主春足厥陰少陽主治其日甲乙肝苦急急食甘以緩之心主夏手少陰太陽主治其日丙丁心苦緩急食酸以收之脾主長夏足太陰陽明主治其日庚辛肺苦氣上逆急食苦以泄之腎主冬足少陰太陽主治其日壬癸腎苦燥急食辛以潤之開腠理致津夜通氣也病在肝愈於夏夏不愈甚於秋秋不死持於冬起於春肝病者愈在丙丁丙丁不愈加於庚辛庚辛不死持於壬癸起於甲乙肝病者平旦慧下晡甚夜半靜肝欲散急食辛以散之用辛補之酸瀉之病在心愈在長夏長夏不愈甚於冬冬不死持於春起於夏禁溫食熱衣心病者愈在戊己戊己不愈加於壬癸壬癸不死持於甲乙起於丙丁心病者日中慧夜半甚平旦靜心欲軟急食鹹以軟之用鹹補之甘瀉之病在脾愈在秋不愈甚於春春不死持於夏起於長夏禁溫食飽食濕地濡衣脾病者愈在庚辛庚辛不愈加於甲乙甲乙不死持於丙丁起於戊已脾病者日昳慧日出甚下晡靜脾欲緩急食甘以緩之用苦瀉之甘補之病在肺愈在冬冬不愈甚於夏夏不死持於長夏起於秋禁寒飲飲食寒衣肺病者愈在壬癸壬癸不愈加於丙丁丙丁不死持於戊己起於庚辛肺病者下晡慧日中甚夜半靜肺欲收急食酸以收之用酸補之辛瀉之病在腎愈在春春不愈甚於長夏長夏不死持於秋起於冬禁犯淬㶼熱食溫炙衣腎病者愈在甲乙甲乙不愈甚於戊己戊己不死持於庚辛起於壬癸腎病者夜半慧四季甚下晡靜腎欲堅急食苦以堅之用苦補之咸瀉之肝病者兩脅下痛引少腹令人善怒虛則目䀮䀮音荒無所見耳無所聞善恐如人將捕之取其經厥陰於少陽氣逆則頭痛耳聾不聰頰腫取血者心病者胸中痛脅支滿脅下痛膺背肩甲間痛兩臂內痛虛則胸腹大脅下與腰相引而痛取其經少陰太陽舌下血者其變病刺郤中血者脾病者身重善飢肉痿足不收行善瘛瘲腳下痛虛則腹滿腸鳴飧泄食不化取其經太陰陽明少陰血者肺病者喘逆氣肩背痛汗出尻陰股膝髀腨胻足皆痛虛則少氣不能報息耳聾咽乾取其經太陰足太陽之外厥陰內血者腎病者腹大脛種喘咳身重寢汗出憎風虛則胸中痛大腹小腹痛清厥意不樂取其經少陰太陽血者肝色青宜食甘粳米牛肉棗葵皆甘心色赤宜食酸小豆犬肉李韭皆酸肺色白宜食苦麥羊肉杏薤皆苦脾色黃宜食鹹大豆豕肉栗藿皆咸腎色黑宜食辛黃杞雞肉桃蔥皆辛辛散酸收甘緩苦堅咸軟毒藥攻邪五穀為養粳米小豆麥大豆黃杞五果為助桃李杏栗棗五畜為益牛羊豕犬雞五菜為充葵藿薤蔥韭氣味合而服之以補精益氣此五者有辛酸甘苦咸各有所利或散或收或緩或急或堅或軟四時五臟病隨五味所宜也宣明五氣篇五味所入酸入肝辛入肺苦入心鹹入腎甘入脾是謂五入五氣所病心為噫肺為咳肝為語脾為吞腎為欠為嚏胃為氣逆為噦為恐大腸小腸為泄下焦溢為水膀胱不利為癃不約為遺溺膽為怒是謂五病五精所並精氣並於心則喜並於肺則悲並於肝則憂並於脾則畏並於腎則恐是謂五並虛而相併者也五臟所惡心惡熱肺惡寒肝惡風脾惡濕腎惡燥是謂五惡五臟化液心為汗肺為涕肝為淚脾為涎腎為唾是謂五液五味所禁辛走氣氣病無多食辛咸走血血病無多食鹹苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸是謂五禁無令多食五病所發陰病發於骨陽病發於血陰病發於肉陽病發於冬陰病發於夏是謂五發五邪所亂邪入於陽則狂邪入於陰則痹搏陽則為巔疾搏陰則為瘖陽入之陰則靜陰出之陽則怒是謂五亂五脈所見春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈名曰陰出之陽病善怒不治是謂五邪皆同命死不治五臟所藏心藏神肺藏魄肝藏魂脾藏意腎藏志是謂五臟所藏五臟所主心主脈肺主皮肝主筋脾主肉腎主骨是謂五主五勞所傷久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋是謂五勞所傷五脈應象肝脈弦心脈鉤脾脈代肺脈毛腎脈石是謂五臟之脈血氣形志篇夫人之常數太陽常多血少氣少陽常少血多氣陽明常多氣多血少陰常少血多氣厥陰常多血少氣太陰常多氣少血此天之常數足太陽與少陰為表裡少陽與厥陰為表裡陽明與太陰為表裡是謂足陰陽也手太陽與少陰為表裡少陽與心主為表裡陽明與太陰為表裡是謂手之陰陽也今知手足陰陽所苦凡治血必先去其血乃去其所苦伺之所欲然後瀉有餘補不足形樂志苦病生於脈治之以灸刺形樂志樂病生於肉治之以石形苦志樂病生於筋治之以尉引形苦志苦病生於咽嗌治之以百藥形數驚恐經絡不通病生於不仁治之以按摩醪藥寶命全形論形之疾病莫知其情留淫日深著於骨髓夫鹽之味鹹者其氣令器津泄弦絶者其音嘶敗水敷者其葉發病深者其聲噦人有此三者是謂壞府毒藥無治短針無取此皆絶皮傷肉血氣爭黑水得金而伐火得水而滅土得水而達金得火而缺水得土而絶萬物盡然不可勝竭八正神明論天溫日明則人血淖液而衛氣浮故血易瀉氣易行天寒日陰則人血凝泣而衛氣沉月始生則血氣始精衛氣始行月郭滿則血氣實肌肉堅月郭空則肌肉減經絡虛衛氣去形獨居是以因天時而調血氣也以身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟故曰天忌不可不知也正邪者身形若用力汗出腠理開逢虛風其中人也微故莫知其情莫見其形上工救其萌牙下工救其已成救其已敗故養神者必知形之肥瘦榮衛血氣之盛衰血氣者人之神不可不謹養離合真邪論天有宿度地有經水人有經脈天地溫和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起則經水波浦而隴起夫邪之入於脈也寒則血凝泣暑則氣淖澤虛邪因而入客亦如經水之得風也通評虛實論邪氣盛則實精氣奪則虛氣虛者肺虛也氣逆者足寒也非其時則生當期時則死余藏皆如此夫虛實者皆從其物類始故五臟骨肉滑利可以長久也太陰陽明論限者天氣也主外陰者地氣也主內故陽道實陰道虛故犯賊風虛邪者陽受之食飲不節起居不時者陰受之陽受之則入六腑陰受之則入五藏入六腑則身熱不時臥上為喘籲入五臟則䐜滿閉塞下為飧泄久為腸澼故喉主天氣咽主地氣故陽受風氣陰受濕氣故陰氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足故曰陽病者上行極而下陰病者下行極而上故傷於風者上先受之傷於濕者下先受之四肢皆稟氣於胃而不得至經必因於脾乃得稟也今脾病不能為胃行其津液四支不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生陽明脈解篇四肢者諸陽之本也陽盛則四肢實熱論篇人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必不免於死傷寒一日巨陽受之故頭項痛腰脊強二日陽明受之陽明主肉其脈俠鼻絡於目故身熱目疼而鼻乾不得臥也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾三陽經絡皆受其病而未入於藏者故可汗而已四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮三陰三陽五臟六腑皆受病榮衛不行五臟不通則死矣其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病日已矣其病兩感於寒者一日則巨陽與少陰俱病則頭痛口乾而煩滿二日則陽明與太陰俱病則腹滿身熱不欲食譫言三日則少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死陽明者十二經脈之長也其血氣盛故不知人三日其氣乃盡故死矣先夏至日者為病溫後夏至日者為病暑氣厥論腎移寒於脾癰腫少氣脾移寒於肝癰腫筋攣肝移寒於心狂隔中心移寒於肺肺消肺消者飲一溲二死不治肺移寒於腎為湧水湧水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿水之病也脾移熱於肝則為驚衄肝移熱於心則死心移熱於肺傳為鬲消肺移熱於腎傳為柔痙腎移熱於脾傳為虛腸澼死不可治胞移熱於膀胱則癃溺血膀胱移熱於小腸鬲腸不便上為口糜小腸移熱於大腸為慮音復瘕為沉大腸移熱於胃善食而瘦又謂之食亦胃移熱於膽亦曰食亦膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也傳為衄衊音滅瞑目故得之氣厥也咳論乘秋則肺先受邪乘春則肝先受之乘夏則心先受之乘至陰則脾先受之乘冬則腎先受之肺咳之狀咳而喘息有音甚則唾血心咳之狀咳則心痛喉中介介如梗狀甚咳則咽腫喉痹肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿脾咳之狀咳則右脅下痛隱隱引肩背甚則不可以動動則咳劇腎咳之狀咳則腰背相引而痛甚則咳涎五臟之久咳乃移於六腑脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出肝咳不已則膽受之膽咳之狀咳嘔膽汁肺咳不已則大腸受之大腸咳狀咳而遺失心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失腎咳不已則膀胱受之膀胱咳狀咳而遺溺久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲此皆聚於胃關天於肺使人多涕唾而面浮腫氣逆也治藏者治其俞治府者治其合浮腫者治其經舉痛論五臟六腑固盡有部視其五色黃赤為熱白為寒青黑為痛此所謂視而可見者也百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結怒則氣逆甚則嘔血及飧泄故氣上矣喜則氣和志達榮衛通利故氣緩矣悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣恐則精卻卻則上焦閉閉則還氣還則下焦脹故氣不行矣寒則腠理閉氣不行故氣收矣炅則腠理開榮衛通汗大泄故氣泄驚則心無所倚神無所歸慮無所定故氣亂矣勞則喘息汗出外內皆越故氣耗矣思則心有所存神有所歸正氣留而不行故氣結矣腹中論夫芳草之氣美石藥之氣悍二者其氣急疾堅徑故非緩心和人不可以服此二者夫熱氣慓悍藥氣亦然二者相遇恐內傷脾脾者土也而惡木服此藥者至甲乙日更論風論風者百病之長也至其變化乃為他病也肺風之狀多汗惡風色皏然白時咳短氣晝日則差暮則甚診在眉上其色自心風之狀多汗惡風焦絶善怒嚇赤色病甚則言不可快診在口其色赤肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子診在目下其色青脾風之狀多汗惡風身體怠墮四肢不欲動色薄微黃不嗜食診在鼻上其色黃腎風之狀多汗惡風面龐然浮腫脊痛不能正立其色炲隱曲不利診在肌上其色黑胃風之狀頸多汗惡風飲食不下鬲塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腸大首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈漏風之狀或多汗常不可單衣食則汗出甚則身汗喘息惡風衣常濡口乾善渴不能勞事泄風之狀多汗汗出泄衣上口中乾上漬其風不能勞事身體盡痛則寒痹論痹者各以其時重感於風寒濕之氣也凡痹之客五臟者肺痹者煩滿喘而嘔心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐肝痹者夜臥則驚多飲數小便上為引如懷腎痹者善脹尻以代踵脊以代頭脾痹者四肢解墮發咳嘔汁上為大塞腸痹者數飲而出不得中氣喘爭時發飧泄胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕淫氣喘息痹聚在肺淫氣憂思痹聚在心淫氣遺溺痹聚在腎淫氣之竭痹聚在肝淫氣肌絶痹聚在脾榮者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈也故循脈上下貫五臟絡六腑也衛者水穀之悍氣也其氣慓疾滑利不能入於脈也故循皮膚之中分肉之間熏於肓音荒膜散於胸腹逆其氣則病從其氣則愈不與風寒濕氣合故不為痹凡痹之類逢寒則蟲逢熱則縱痿論肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之肌肉腎主身之骨髓故肺熱葉焦則皮毛虛弱急薄著則生痿躄也心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折摯脛縱而不任地也肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿脾氣熱則胃干而渴肌肉不仁發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿肺者藏之長也為心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦故曰五臟因肺熱葉焦發為痿躄悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血也故曰大經空虛發為肌痹傳為脈痿思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫故曰筋痿者生於肝使內也有漸於濕以水為事若有所留居處相濕肌肉濡漬痹而不仁發為肉痿故曰肉痿者得之濕地也有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水藏也今水不勝火則骨枯而髓虛故足不任身發為骨痿故曰骨痿者生於大熱也肺熱者色白而毛敗心熱者色赤而絡脈溢肝熱者色蒼而爪枯脾熱者色黃而肉蠕動腎熱者色黑而齒稿厥論寒厥何失而然也前陰者宗筋之所聚太陰陽明之所合也春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰此人者質壯以秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從之而上也氣因於中陽氣衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒也熱厥何如而然也酒入於胃則絡脈滿而經脈虛脾主為胃行其津液者也陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營其四肢也此人必數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相薄熱盛於中故熱偏於身內熱而溺赤也夫酒氣盛而慓悍腎氣有衰陽氣獨勝故手足為之熱也巨陽之厥則腫首頭重足不能行發為眴音赴僕陽明之厥則癲疾欲走呼腹滿不得臥面赤而熱妄見而妄言少陽之厥則暴聾頰腫而熱脅痛䯒不可以運太陰之厥則腹滿䐜脹後不利不欲食食則嘔不得臥少陰之厥則口乾溺赤腹滿心痛厥陰之厥則少腹腫痛腹脹涇溲不利好臥屈膝陰縮腫䯒內熱盛則瀉之虛則補之不盛不虛以經取之太陰厥逆䯒急攣心痛引腹治主病者少陰厥逆虛滿嘔變下泄清治主病者厥陰厥逆攣腰痛虛滿前閉譫言治主病者三陰俱逆不得前後使人手足寒三日死太陽厥逆僵仆嘔血善衄治主病者少陽厥逆機關不利機關不利者腰不可以行項不可以顧發腸癰不可治驚者死陽明厥逆喘咳身熱善驚衄嘔血手太陰厥逆虛滿而咳善嘔沫治主病者手心主少陰厥逆心痛引喉身熱死不可治手太陽厥逆耳聾泣出項不可以顧腰不可以俯仰治主病者手陽明少陽厥逆發喉痹嗌腫痓治主病者奇病論有病口甘者此五氣之溢也名曰脾疸夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也此肥美之所發也此人必數食甘美而多肥也肥者令人內熱甘者令人中滿故其氣上溢轉為消渴治之以蘭除陳氣也有病口苦者名曰膽疸夫肝者中之將也取決於膽咽為之使此人者數謀慮不決故膽虛氣上溢而口為之苦治之以膽募俞大奇論心脈滿大癇瘛筋攣肝脈小急癇瘛筋攣肝脈騖暴有所驚駭脈不至若瘖不治自已腎脈小急肝脈小急心脈小急不鼓皆為瘕腎肝並沉為石水並浮為風水並虛為死並小弦欲驚腎脈大急沉肝脈大急沉皆為疝心脈搏滑急為心疝肺脈沉搏為肺疝三陽急為瘕三陰急為疝二陰急為癇厥二陽急為驚脾脈外鼓沉為腸澼久自已肝脈小緩為腸澼易治腎脈小搏沉為腸澼下血血溫身熱者死心肝澼亦下血二藏同病者可治其脈小沉澀為腸澼其身熱者死熱見七日死胃脈沉鼓澀胃外鼓大心脈小堅急皆鬲偏枯男子發左女子發右不瘖舌轉可治三十日起其從者瘖瘖三歲起年不滿二十者三歲死脈至而搏血衄身熱者死脈來懸鉤浮為常脈脈至如喘名曰暴厥暴厥者不知與人言脈至如數使人暴驚三四日自已脈至浮合浮合如數一息十至以上是經氣豫不足也微見九十日死脈至如火薪然是心精之豫奪也草乾而死脈至如散葉是肝氣豫虛也木葉落而死脈至如省客省客者脈塞而鼓是腎氣豫不足也懸去棗華而死脈至如丸泥是胃精豫不足也榆莢落而死脈至如橫格是膽氣豫不足也禾熟而死脈至如弦縷是胞精豫不足也病善言下霜而死不言可治脈至如交漆交漆者左右傍至也微見三十日死脈至如湧泉浮鼓肌中太陽氣豫不足也少氣味韭英而死脈至如頽土之狀按之不得是肌氣豫不足也五色先見黑白壘發死脈至如懸雍懸雍者浮揣切之益大是十二俞之豫不足也水凝而死脈至如偃刀偃刀者浮之小急按之堅大急五臟菀熟寒熱獨並於腎也如此其人不得坐立春而死脈至如丸滑不直手不直手者按之不可得也是大腸氣豫不足也棗葉生而死脈至如華者令人善恐不欲坐臥行立常聽是小腸氣豫不足也季秋而死刺禁論藏有要害不可不察肝生於左肺藏於右心部於表腎治於裡脾為之使胃為之部鬲肓之上中有父母七節之傍中有小心從之有福逆之有咎刺中心一日死其動為噫刺中肝五日死其動為語刺中腎六日死其動為嚏刺中肺三日死其動為咳刺中脾十日死其動為吞刺中膽一日半死其動為嘔刺跗上中大脈血出不止死刺面中溜脈不幸為盲刺頭中腦戶入腦立死刺舌下中脈太過血出不止為瘖刺足下布絡中脈血不出為腫刺郤中大脈令人僕脫色刺氣街中脈血不出為腫鼠僕刺脊間中髓為傴刺乳上中乳房為腫根蝕刺缺盆中內陷氣泄令人咳逆刺手魚腹內陷為腫無刺大醉令人氣亂無刺大怒令人氣逆無刺大勞人無刺新飽人無刺大飢人無刺大渴人無刺大驚人刺陰股中大脈血出不止死刺客主人內陷中脈為內漏為聾刺膝音牝臏出液為跛刺臂太陰脈出血多立死刺足少陰脈重虛出血為舌難以言刺膺中陷中肺為喘逆仰息刺肘中內陷氣歸之為不屈伸刺陰股下三寸內陷令人遺溺刺腋下脅間內陷令人咳刺少腹中膀胱溺出令人少腹滿刺腨腸內陷為腫刺匡上陷骨中脈為漏為盲刺關節中液出不得屈伸刺志論氣實形實氣虛形虛此其常也反此者病谷盛氣盛谷虛氣虛此其常也反此者病脈實血實脈虛血虛此其常也反此者病氣虛身熱此謂反也谷入多而氣少此謂反也谷不入而氣多此謂反也脈盛血少此謂反也脈少血多此謂反也氣盛身寒得之傷寒氣虛身熱得之傷暑谷入多而氣少者得之有所脫血濕居下也谷入少而氣多者邪在胃及與肺也脈小血多者飲中熱也脈大血少者脈有風氣水漿不入此之謂也夫實者氣入也虛者氣出也氣實者熱也氣虛者寒也入實者左手開針空也入虛者左手閉針空也針解篇夫一天二地三人四時五音六律七星八風九野身形亦應之針各有所宜故曰九針人皮應天人肉應地人脈應人人筋應時人聲應音人陰陽合氣應律人齒面目應星人出入氣應風人九竅三百六十五絡應野故一針皮二針肉三針脈四針筋五針骨六針調陰陽七針益精八針除風九針通九竅除三百六十五節氣此謂各有所生也人心意應八風人氣應天人發齒耳目五聲應五音六律人陰陽脈血氣應地人肝目應之九皮部論欲知皮部以經脈為紀者諸經皆然陽明之陽名曰害蜚上下同法視其部中有浮絡者皆陽明之絡也其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也絡盛則入客於經陽主外陰主內少陽之陽名曰樞持上下同法視其部中有浮絡者皆少陽之絡也絡盛則入客於經故在陽者主內在陰者主出以滲於內諸經皆然太陽之陽名曰關樞上下同法視其部中有浮絡者皆太陽之絡也絡盛則入客於經少陰之陰名曰樞儒上下同法視其部中有浮絡者皆少陰之絡也絡盛則入客於經其入經也從陽部注於經其出者從陰內注於骨心主之陰名曰害肩上下同法視其部中有浮絡者皆心主之絡也絡盛則入客於經太陰之陰名曰關蟄上下同法視其部中有浮絡者皆太陰之絡也絡盛則入客於經凡十二經絡脈者皮之部也是故百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於腑廩於腸胃邪之始入於皮也泝然起毫毛開腠理其入於絡也則絡脈盛色變其入客於經也則感虛乃陷下其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍㬷破毛直而敗皮者脈之部也邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於腑臟也故皮者有分部不與而生大病也經絡論經有常色而絡無常變心赤肺白肝青脾黃腎黑皆亦應其經絡之色也陰絡之色應其經陽絡之色變無常隨四時而行也寒多則凝泣凝泣則青黑熱多則淖澤淖澤則黃赤此皆常色謂之無病五色具見者謂之寒熱氣穴論氣穴三百六十五以應一歲臟俞五十穴腑俞七十二穴熱俞五十九穴水俞五十七穴頭上五行行五五五二十五穴中呂兩傍各五凡十穴大椎上兩傍各一凡二穴目瞳子浮白二穴兩髀厭分中二穴犢鼻二穴耳中多所聞二穴眉本二穴完骨二穴頂中央一穴枕骨二穴上關二穴大迎二穴下關二穴天柱二穴巨虛上下廉四穴曲牙二穴天突一穴天府二穴天牖二穴扶突二穴天窗二穴肩解二穴關元一穴委陽二穴肩貞二穴瘖門一穴齊一穴胸俞十二穴背俞二穴膺俞十二穴分肉二穴踝上橫二穴陰陽蹻四穴水俞在諸分熱俞在氣穴寒熱俞在兩骸厭中二穴大禁二十五在天府下五寸凡三百六十五穴針之所由行也孫絡三百六十五穴會亦以應一歲肉之大會為谷肉之小會為溪溪谷三百六十五穴會亦應一歲孫絡之脈別經者其血盛而當瀉者亦三百六十五脈並注於絡傳注十二絡脈非獨十四絡脈也內解瀉於中者十脈氣府論足太陽脈氣所發者七十八穴兩眉頭各一入發至項三寸半傍五相去三寸其浮氣在皮中者凡五行行五五五二十五項中大筋兩傍各一風府兩傍各一俠背以下至尻尾二十一節十五間各一五臟之俞各五六腑之俞各六委中以下至足小指