刺筋骨血氣上逆令人善怒秋刺經脈血氣上逆令人善忘秋刺絡脈氣不外行令人臥不欲動秋刺筋骨血氣內散令人寒栗冬刺經脈血氣皆脫令人目不明冬刺絡脈內氣外泄留為大痹冬刺肌肉陽氣竭絶令人善忘標本病傳論治反為逆治得為從先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本先熱而後生中滿者治其標先病而後泄者治其本先泄而後生他病者治其本必且調之乃治其他病先病而後先中滿者治其標先中滿而後煩心者治其本人有客氣有同氣小大不利治其標小大利治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本先小大不利而後生病者治其本夫病傳者心病先心痛一日而咳三日脅支痛五日閉塞不通身痛體重三日不已死冬夜半夏日中肺病喘咳三日而脅支滿痛一日身重體痛五日而脹十日不已死冬日入夏日出肝病頭目眩脅支滿三日體重身痛五日而脹三日腰脊少腹痛脛酸三日不已死冬日入夏早食脾病身痛體重一日而脹二日少腹腰脊痛脛酸三日背呂筋痛小便閉十日不已死冬人定夏晏食腎病少腹腰脊痛䯒酸三日背呂筋痛小便閉三日腹脹三日兩脅支痛三日不已死冬大晨夏晏脯胃病脹滿五日少腹腰脊痛䯒酸三日背䯒筋痛小便閉五日身體重六日不已死冬夜半後夏日昳膀胱病小便閉五日少腹脹腰脊痛䯒酸一日腹脹一日身體痛二日不已死冬雞鳴夏下脯諸病以次是相傳如是者皆有死期不可刺天元紀大論天有五行御五位以生寒暑燥濕風人有五臟化五氣以生喜怒思憂恐故物生謂之化物極謂之變陰陽不測謂之神神用無方謂之聖夫變化之為用也在天為玄在人為道在地為化化生五味道生智玄生神神在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水故在天為氣在地成形氣形相感而化生萬物矣然天地者萬物之上下也左右者陰陽之道路也水火者陰陽之徵兆也金木者生成之終始也氣有多少形有盛衰上下相召而損益彰矣太虛寥廓肇基化元萬物資始五運終天布氣真靈總統坤元九星懸朗七曜周旋曰陰曰陽曰柔曰剛幽顯既位寒暑弛張生生化化品物咸章陰陽之氣各有多少故曰三陰三陽也形有盛衰謂五行之治各有太過不及也故其始也有餘而往不足隨之不足而往有餘從之知迎知隨氣可與期應天為天符承歲為歲直三合為治寒暑燥濕風火天之陰陽也三陰三陽上奉之木火土金水火地之陰陽也生長化收藏下應之天以陽生陰長地以陽殺陰藏天有陰陽地亦有陰陽木火土金水火地之陰陽也生長化收藏故陽中有陰陰中有陽所以欲知天地之陰陽者應天之氣動而不息故五歲而右遷應地之氣靜而守位故六期而環會動靜相召上下相臨陰陽相錯而變由生也天以六為節地以五為制周天氣者六期為一備終地紀者五歲為一周君火以明相火以位五六相合而七百二十氣為一紀凡三十歲千四百四十氣凡六十歲而為一周不及太過期皆見矣甲己之歲土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之歲木運統之戊癸之歲火運統之子午之歲上見少陰醜末之歲上見太陰寅申之歲上見少陽卯酉之歲上見陽明辰戌之歲上見太陽巳亥之歲上見厥陰少陰所謂標也厥陰所謂終也厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上相火主之陽明之上燥氣主之太陽之上寒氣主之所謂本也是謂六元五運行大論丹天之氣經於牛女戊分黅音今天之氣經於心尾已分蒼天之氣經於危室柳鬼素天之氣經於亢氐昂畢玄天之氣經於張翼婁胃所謂戊巳分者奎璧角軫則天地之門戶也夫候之所始道之所生不可不通也所謂上下者歲上下見陰陽之所在也左右者諸上見厥陰左少陰右太陽見少陰左太陰右厥陰見太陰左少陽右少陰見少陽左陽明右太陰見陽明左太陽右少陽見太陽左厥陰右陽明所謂面北而命其位言其見也厥陰在上則少陽在下左陽明右太陰少陰在上則陽明在下左太陽右少陽太陰在上則太陽在下左厥陰右陽明少陽在上則厥陰在下左少陰右太陽陽明在上則少陰在下左太陰右厥陰太陽在上則太陰在下左少陽右少陰所謂面南而命其位言其見也上下相遘寒暑相臨氣相得則和不相得則病氣相得而病者以下臨上不當位也上者右行下者左行左右周天余而復會也夫變化之用天垂象地成形七曜緯虛五行麗地地者所以載生成之形類也虛者所以列應天之精氣也形精之動猶根本之與枝葉也仰觀其象雖遠可知也地為人之下太虛之中大氣舉之也燥以干之暑以蒸之風以動之濕以潤之寒以堅之火以溫之故風寒在下燥濕在上濕氣在中火遊行其間寒暑六入故令虛而化生也故燥勝則地干暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂火勝則地固矣天地之氣勝復之作不形於診也脈法曰天地之變無以脈診此之謂也隨氣所在期於左右從其氣則和違其氣則病不當其位者病迭移其位者病失守其位者危尺寸反者死陰陽交者死先立其年以知其氣左右應見然後乃可以言死生之逆順寒暑燥濕風火在人合之萬物以生化東方生風風生木木生酸酸生肝肝生筋筋生心其在天為玄在人為道在地為化化生五味道生智玄生神化生氣神在天為風在地為木在體為筋在氣為柔在藏為肝其性為暄其德為和其用為動其色為蒼其化為榮其蟲毛其政為散其令宣發其變摧拉其盲為隕其味為酸其志為怒怒傷肝悲勝怒風傷肝燥勝風酸傷筋辛勝酸南方生熱熱生火火生苦苦生心心生血血生脾其在天為熱在地為火在體為脈在氣為息在藏為心其性為暑其德為顯其用為躁其色為赤其化為茂其蟲羽其政為明其令鬱蒸其變炎爍其眚燔焫其味為苦其志為喜喜傷心恐勝喜熱傷氣寒勝熱苦傷氣咸勝苦中央生濕濕生土土生甘甘生脾脾生肉肉生肺其在天為濕在地為土在體為肉在氣為充在藏為脾其性靜兼其德為濡其用為化其色為黃其化為盈其蟲倮音盡其政為謐其令雲雨其變動注其眚淫潰其味為甘其志為思思傷脾怒勝思濕傷肉風勝濕甘傷脾酸勝甘西方生燥燥生金金生辛辛生肺肺生皮毛皮毛生腎其在天為燥在地為金在體為皮毛在氣為成在藏為肺其性為涼其德為清其用為固其色為白其化為斂其蟲介其政為徑其令霧露其變肅殺其眚蒼落其味為辛其志為憂憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛北方生寒寒生水水生咸咸生腎腎生骨髓髓生肝其在天為寒在地為水在體為骨在氣為堅在藏為腎其性為凜其德為寒其用為本闕其色為黑其化為肅其蟲鱗其政為靜其令本闕其變凝冽其眚冰雹其味為咸其志為恐恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸五氣更立各有所先非其位則邪當其位則正病之生變氣相得則微不相得則甚六微旨大論帝曰願聞天道六六之節盛衰何也岐伯曰上下有位左右有紀故少陽之右陽明治之陽明之右太陽治之太陽之右厥陰治之厥陰之右少陰治之少陰之右太陰治之太陰之右少陽治之此所謂氣之標蓋南面而待之也故曰因天之序盛衰之時移光定位正立而待之此之謂也少陽之上火氣治之中見厥陰陽明之上燥氣治之中見太陰太陽之上寒氣治之中見少陰厥陰之上風氣治之中見少陽少陰之上熱氣治之中見太陽太陰之上濕氣治之中見陽明所謂本也本之下中之見也見之下氣之標也木標不同氣應異象其有至而至者和至而不至來氣不及也未至而至來氣有餘也應則順否則逆逆則變生變生則病物生其應也氣脈其應也顯明之右君火之位也君火之右退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之復行一步君火治之相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之亢則害承乃制制則生化外列盛衰害則敗亂生化大病非其位則邪當其位則正邪則變甚正則微木運臨卯火運臨午土運臨四季金運臨酉水運臨子所謂歲會氣之平也非位歲不與會也土運之歲上見太陰火運之歲上見少陽少陰金運之歲上見陽明木運之歲上見厥陰水運之歲上見太陽天之與會也故天元册曰天符天符為執法歲位為行令太一天符為貴人中執法者其病速而危中行令者其病徐而持中貴人者其病暴而死位之易也君位臣則順臣位君則逆逆則其病近其害速順則其病遠其害微所謂二火也所謂步者六十度而有奇故二十四步積盈百刻而成日也六氣應五行之變位有終始氣有初中上下不同求之亦異也天氣始於甲地氣始於子子甲相合命曰歲立謹候其時氣可與期甲子之歲初之氣天數始於水下一刻終於八十七刻半二之氣始於八十七刻六分終於七十五刻三之氣始於七十六刻終於六十二刻半四之氣始於六十二刻六分終於五十刻五之氣始於五十一刻終於三十七刻半六之氣始於三十七刻六分終於二十五刻所謂初六天之數也乙丑歲初之氣天數始於二十六刻終於一十二刻半二之氣始於一十二刻六分終於水下百刻三之氣始於一刻終於八十七刻半四之氣始於八十七刻六分終於七十五刻五之氣始於七十六刻終於六十二刻半六之氣始於六十二刻六分終於五十刻所謂六二天之數也丙寅歲初之氣天數始於五十一刻終於三十七刻半二之氣始於三十七刻六分終於二十五刻三之氣始於二十六刻終於一十二刻半四之氣始於一十二刻六分終於水下百刻五之氣始於一刻終於八十七刻半六之氣始於八十七刻六分終於七十五刻所謂六三天之數也丁卯歲初之氣天數始於七十六刻終於六十二刻半二之氣始於六十二刻六分終於五十刻三之氣始於五十一刻終於三十七刻半四之氣始於三十七刻六分終於二十五刻五之氣始於二十六刻終於一十二刻半六之氣始於一十二刻六分終於水下百刻所謂六四天之數也次戊辰歲初之氣復始於一刻常如是無已周而復始日行一周天氣始於一刻日行再周天氣始於二十六刻日行三周天氣始於五十一刻日行四周天氣始於七十六刻日行五周天氣復始於一刻所謂一紀也是故寅午戌歲氣會同卯未亥歲氣會同辰申子歲氣會同巳酉醜歲氣會同終而復始其用也言天者求之本言地者求之位言人者求之氣交上下之位氣交之中人之居也故曰天樞之上天氣主之天樞之下地氣主之氣交之分人氣從之萬物由之何謂初中初凡三十度而有奇中氣同法初中何也所以分天地也初者地氣也中者天氣也氣之升降天地之更用也升已而降降者謂天降已而升升者謂地天氣下降氣流於地地氣上升氣騰於天故高下相召升降相因而變作矣
