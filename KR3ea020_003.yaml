差其分微者小差甚者大差甚則位易氣交易則大變生而病作矣大要曰甚紀五分微紀七分其差可見矣欲不遠寒不遠熱也發表不遠熱攻裡不遠寒不發不攻而犯寒犯熱寒熱內賊其病益甚無病者生之有者甚之生者不還熱則熱至不還寒則寒至寒至則堅否腹滿痛急下利之病生矣熱至則身熱吐下霍亂癰疽瘡瘍瞀郁注下瞤瘛腫脹嘔鼽衄頭痛骨節變肉痛血溢血泄淋閉之病生矣治之奈何時必順之犯者治以勝也木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之然調其氣過者折之以其畏也所謂瀉之至真要大論厥陰司天為風化己亥之歲在泉為酸化寅申之歲司氣為蒼化丁壬之歲間氣為動化少陰司天為熱化子午之歲在泉為苦化卯酉之歲不司氣化居氣為灼化太陰司天為濕化醜末之歲在泉為甘化辰戌之歲司氣為黅化甲巳之歲間氣為柔化少陽司天為火化寅申之歲在泉為苦化己亥之歲司氣為丹化戊癸歲也間氣為明化陽明司天為燥化卯酉之歲在泉為辛化子午之歲司氣為素化乙庚歲也間氣為清化太陽司天為寒化辰戌之歲在泉為咸化醜末之歲司氣為玄化丙辛歲也間氣為藏化故治病者必明六化分治五味五色所生五臟所宜乃可以言盈虛病生之緒也北政之歲少陰在泉則寸口不應厥陰在泉則右不應太陰在泉則左不應南政之歲少陰司天則寸口不應厥陰司天則右不應太陰司天則左不應諸不應者反其診則見矣北政之歲三陰在下則寸不應三陰在上則尺不應南政之歲三陰在天則寸不應三陰在泉則尺不應左右同歲厥陰在泉風淫所勝則地氣不明平野昧草乃早秀民病灑灑振寒善伸數缺心痛支滿兩脅裡急飲食不下鬲咽不通食則嘔腹脹善噫得後與氣則怏然如衰身體皆重寅申歲也歲少陰在泉熱淫所勝則焰浮川澤陰處反明民痛腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛目瞑齒痛䪼腫惡寒發熱如虛少腹中痛腹大蟄蟲不藏卯酉歲也歲太陰在泉草乃早榮濕淫所勝則埃昏岩谷黃反見黑至陰之交民病飲積心痛耳聾渾渾焞焞嗌腫喉痹陰病血見少腹痛腫不得小便病沖頭痛目似脫項似拔腰似折髀不可以回膕如結腨如別辰戌歲也歲少陽在泉火淫所勝則焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便少陰同候己亥歲也歲陽明在泉燥淫所勝則霿霧清瞑民病喜嘔嘔有苦善太息心脅痛不能反側甚則咽乾面塵身無膏澤足外反熱子午歲也歲太陽在泉寒淫所勝則凝肅慘栗民病少腹控睪引腰脊上衝心痛血見嗌痛頷腫丑未歲也諸氣在泉風淫於內治以辛涼佐以苦以甘緩之以辛散之熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之火淫於內治以鹹冷佐以苦辛以酸收之以苦發之燥淫於內治以苦溫佐以甘辛以苦下之寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之厥陰司天風淫所勝則太虛埃昏雲物以擾寒生春氣流水不冰民病胃脘當心而痛上支兩脅鬲咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉蟄蟲不去病體於脾己亥歲也衝陽絶死不治少陰司天熱淫所勝怫熱至火行其政大雨且至民病胸中煩熱咽乾右胠滿皮膚痛寒熱咳喘唾血血泄鼽衄嚏嘔溺色變甚則瘡瘍胕腫肩背臂臑及缺盆中痛心痛肺䐜腹大滿膨膨而喘咳病本於肺子午歲也尺澤絶死不治太陰司天濕淫所勝則沉陰且布雨變枯槁胕腫骨痛陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本於腎丑未歲也太溪絶死不治少陽司天火邪所勝則溫氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黃赤傳而為水身面胕腫腹滿仰息泄注赤白瘡瘍咳唾血煩心胸中熱甚則鼽衄病本於肺寅申歲也天府絶死不治陽明司天燥淫所勝則木乃晚榮草乃晚生筋骨內變大涼革候名木斂生菀於下草焦上首蟄蟲來見民病左胠脅痛寒清於中感而瘧咳腹中鳴注泄鶩溏心脅暴痛不可反側咽乾面塵腰痛丈夫頽疝婦人少腹痛目昧背瘍瘡座癰病本於肝卯酉歲也太衝絶死不治太陽司天寒淫所勝則寒氣反至水且冰血變於中發為癰瘍民病厥心痛嘔血血鼽衄善悲時眩僕運火炎烈雨暴乃雹胸腹滿手熱肘攣掖沖心淡淡大動胸脅胃脘不安面赤目黃善噫咽乾甚則色炲渴而欲飲病本於心辰戌歲也神門絶死不治所謂動氣知其藏也司天之氣風淫所勝平以辛涼佐以苦甘以甘緩之以酸瀉之熱淫所勝平以鹹寒佐以苦甘以酸收之濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之濕上甚而熱治以苦溫佐以苦辛以汗為故而止火淫所勝平以酸冷佐以苦甘以酸收之以苦發之以酸復之熱淫同燥淫所勝平以苦濕佐以酸辛以苦下之寒淫所勝平以辛熱佐以甘苦以咸瀉之風司於地清反勝之治以酸溫佐以苦甘以辛平之熱司於地寒反勝之治以甘熱佐以苦辛以鹹平之濕司於地熱反勝之治以苦冷佐以鹹甘以苦平之火司於地寒反勝之治以甘熱佐以苦辛以鹹平之燥司於地熱反勝之治以平寒佐以苦甘以酸平之以和為利寒司於地熱反勝之治以鹹冷佐以甘辛以苦平之風化於天清反勝之治以酸溫佐以甘苦己亥歲也熱化於天寒反勝之治以甘溫佐以苦酸辛子午歲也濕化於天熱反勝之治以苦寒佐以苦酸丑未歲也火化於天寒反勝之治以甘熱佐以苦辛寅申歲也燥化於天熱反勝之治以辛寒佐以苦甘卯酉歲也寒化於天熱反勝之治以鹹冷佐以苦辛辰戌歲也厥陰之勝耳鳴頭眩憒憒欲吐胃鬲如寒大風數舉倮蟲不滋胠脅氣並化而為熱小便黃赤胃脘當心而痛上支兩脅腸鳴飧泄少腹痛注下赤白甚則嘔吐鬲咽不通己亥歲也少陰之勝心下熱善飢臍下反動氣遊三焦炎暑至木乃津草乃萎嘔逆躁煩腹滿痛溏泄傳為赤沃子午歲也太陰之勝火氣內郁瘡瘍于于中流散於外病在胠脅甚則心痛熱𧵅頭痛喉痹項強獨勝則濕氣內郁寒迫下焦痛留頂互引眉間胃滿雨數至燥化乃見少腹滿腰脽重強內不便善注泄足下溫頭重足脛胕腫飲發於中胕腫於上丑未歲也少陽之勝熱客於胃煩心心痛目赤欲嘔嘔酸善肌耳痛溺赤善驚譫妄暴熱消爍草萎水涸介蟲乃屈少腹痛下沃赤白寅申歲也陽明之勝清發於中左胠脅痛溏泄內為嗌塞外發㿗疝大涼肅殺華英改容毛蟲乃殃胸中不便嗌塞而咳卯酉歲也太陽之勝凝栗且至非時水冰羽乃後化痔虛發寒厥入胃則內生心痛陰中乃瘍隱曲不利互引陰股筋肉拘苛血脈凝泣絡滿色變或為血泄皮膚否利腹滿食減熱反上行頭項胸頂腦戶中痛目如脫寒入下焦傳為濡瀉辰戌歲也厥陰之勝治以甘清佐以苦辛以酸瀉之少陰之勝治以辛寒佐以苦鹹以甘瀉之太陰之勝治以咸熱佐以辛甘以苦瀉之少陽之勝治以辛寒佐以甘鹹以甘瀉之陽明之勝治以酸溫佐以辛甘以苦泄之太陽之勝治以甘熱佐以辛酸以咸瀉之厥陰之復少腹堅滿裡急暴痛偃木飛沙倮蟲不榮厥心痛汗發嘔吐飲食不入入而復出筋骨掉眩清厥甚則入脾食痹而吐衝陽絶死不治少陰之復燠熱內作煩躁鼽嚏少腹絞痛火見燔焫嗌燥分注時止氣動於左上行於右𬋖皮膚痛暴喑心痛鬱冒不知人乃灑淅惡寒振栗譫妄寒已而熱渴而欲飲少氣骨痿隔腸不便外為浮腫噦噫赤氣後化流水不冰熱氣大行介蟲不復病痱疹瘡瘍癰疽痤痔甚則入肺咳而鼻淵天府絶死不治太陰之復濕變乃舉體重中滿食飲不化陰氣上厥胸中不便飲發於中咳喘有聲大雨時行麟見於陸頭頂痛重而掉瘛尤甚嘔而密默唾吐清液甚則入腎竅瀉無度太溪絶死不治少陽之復大熱將至枯燥燔介蟲乃耗驚瘛咳衄心熱煩躁便數憎風厥氣上行面如浮埃目乃瞤瘛火氣內發上為口糜嘔逆血溢血泄發而為虛惡寒鼓粟寒極反熱嗌絡焦槁渴引水漿色變黃赤少氣脈萎化而為水傳為胕腫甚則入肺咳而血泄尺澤絶死不治陽明之復清氣大舉森木蒼干毛蟲乃厲病生胠脅氣歸於左善太息甚則心痛否滿腹脹而泄嘔苦咳噦煩心病在鬲中頭痛甚則入肝驚駭筋攣太衝絶死不治太陽之復厥氣上行水凝雨冰羽蟲乃死心胃生寒胸膈不利心痛否滿頭痛善悲時眩僕食減腰脽反痛屈伸不便地裂冰堅陽光不治少腹控睪引腰脊上衝心唾出清水及為噦噫甚則入心善忘善悲神門絶死不治厥陰之復治以酸寒佐以甘辛以酸瀉之以甘緩之少陰之復治以鹹寒佐以苦辛以甘瀉之以酸收之辛苦發之以咸軟之太陰之復治以苦熱佐以酸辛以苦瀉之燥之泄之少陽之復治以鹹冷佐以苦辛以咸軟之以酸收之辛苦發之發不遠熱無犯溫涼少陰同法陽明之復治以辛溫佐以苦甘以苦泄之以苦下之以酸補之太陽之復治以咸熱佐以甘辛以苦堅之治諸勝復寒者熱之熱者寒之溫者清之清者溫之散者收之抑者散之燥者潤之急者緩之堅者軟之脆者堅之衰者補之強者瀉之各安其氣必清必靜則病氣衰去歸其所宗此治之大體也身半以上其氣三矣天之分也天氣主之身半以下其氣三矣地之分也地氣主之以名命氣以氣命處而言其病半所謂天樞也諸氣在泉風淫於內治以辛涼佐以苦以甘緩之以辛散之熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之火淫於內治以鹹冷佐以苦辛以酸收之以苦發之燥淫於內治以苦溫佐以甘辛以苦下之寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之夫氣之勝也微者隨之甚者制之氣之復也和者平之暴者奪之皆隨勝氣安其屈伏無問其數以平為期厥陰司天客勝則耳鳴掉眩甚則咳主勝則胸脅痛舌難以言己亥歲也少陰司天客勝則鼽嚏頸項強肩背瞀熱頭痛少氣發熱耳聾目瞑甚則胕腫血溢瘡瘍咳喘主勝則心熱煩躁甚則脅痛支滿子午歲也太陰司天客勝則首面胕腫呼吸氣喘主勝則胸腹滿食已而瞀丑未歲也少陽司天客勝則丹疹外發及為丹膘瘡瘍嘔逆喉痹頭痛嗌腫耳聾血溢內為瘛瘲主勝則胸滿咳仰息甚而有血手熱寅申歲也陽明司天清復內余則咳衄嗌塞心鬲中熱咳不止而白血出者死卯酉歲也太陽司天客勝則胸中不利出清涕感寒則咳主勝則喉嗌中鳴辰戌歲也厥陰在泉客勝則大關節不利內為痙強拘瘛外為不便主勝則筋骨繇並腰腹時痛寅申歲也少陰在泉客勝則腰痛尻股膝髀腨胻足病瞀熱以酸胕腫不能久立溲便變主勝則厥氣上行心痛發熱鬲中衆痹皆作發於胠脅魄汗不藏四逆而起卯酉歲也太陰在泉客勝則足痿下重便溲不時濕客下焦發而濡瀉及為腫隱曲之疾主勝則寒氣逆滿食飲不下甚則為疝辰戌歲也少陽在泉客勝則腰腹痛而反惡寒甚則下白溺白主勝則熱反上行而客於心心痛發熱格中而嘔少陰同候己亥歲也陽明在泉客勝則清氣動下少腹堅滿而數便瀉主勝則腰重腹痛少腹生寒下為騖溏則寒厥於腸上衝胸中甚則喘不能久立子午歲也太陽在泉寒復內余則腰尻痛屈伸不利股脛足膝中痛丑未歲也治之奈何高者抑之下者舉之有餘折之不足補之佐以所利和以所宜必安其主客適其寒溫同者逆之異者從之其於正味何如木位之主其瀉以酸其補以辛火位之主其瀉以甘其補以咸土位之主其瀉以苦其補以甘金位之主其瀉以辛其補以酸水位之主其瀉以咸其補以苦厥陰之客以辛補之以酸瀉之以甘緩之少陰之客以咸補之以甘瀉之以咸收之太陰之客以甘補之以苦瀉之以甘緩之少陽之客以咸補之以甘瀉之以咸軟之陽明之客以酸補之以辛瀉之以苦泄之太陽之客以苦補之以咸瀉之以苦堅之以辛潤之開發腠理致津液通氣也陽明何謂也兩陽合明也厥陰何也兩陰交盡也氣有高下病有遠近證有內外治有輕重適其至所為故也大要曰君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君一臣六偶之制也故曰近者奇之遠者偶之汗者不以奇下者不以偶補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其至所此之謂也六氣之勝何以候之乘其至也清氣大來燥之勝也風木受邪肝病生焉熱氣大來火之勝也金燥受邪肺病生焉寒氣大來水之勝也火熱受邪心病生焉濕氣大來土之勝也寒水受邪腎病生焉風氣大來木之勝也土濕受邪脾病生焉所謂感邪而生病也乘年之虛則邪甚也失時之和亦邪甚也遇月之空亦邪甚也重感於邪則病危矣有勝之氣其必來復也厥陰之至其脈弦少陰之至其脈鉤太陰之至其脈沉少陽之至大而浮陽明之至短而澀太陽之至大而長至而和則平至而甚則病至而反者病至而不至者病未至而至者病陰陽易者危六氣標本所從不同少陽太陰從本少陰太陽從本從標陽明厥陰不從標本從乎中也故從本者化生於本從標本者有標本之化從中者以中氣為化也是故百病之起有生於本者有生於標者有生於中氣者有取本而得者有取標而得者有取中氣而得者有取標本而得者有逆取而得者有從取而得者逆正順也若順逆也故曰知標與本用之不殆明知逆順正行無問不知是者人足以言診是以亂經脈要曰春不沉夏不弦冬不澀秋不數是謂四塞沉甚曰病弦甚曰病澀甚曰病數甚曰病參見曰病復見曰病未去而去曰病去而不去曰病反者死少陽之主先甘後咸陽明之主先辛後酸太陽之主先咸後苦厥陰之主先酸后辛少陰之主先甘後咸太陰之主先苦後甘佐以所利資以所生是謂得氣諸風掉眩皆屬於肝諸寒收引皆屬於腎諸氣憤郁皆屬於肺諸濕腫滿皆屬於脾諸熱瞀瘛皆屬於火諸痛癢瘡皆屬於心諸厥固泄皆屬於下諸痿喘嘔皆屬於上諸禁鼓栗如喪神守皆屬於火諸痙項強皆屬於濕諸逆衝上皆屬於火諸脹腹大皆屬於熱諸躁狂越皆屬於火諸暴強直皆屬於風諸病有聲鼓之如鼓皆屬於熱諸病胕腫疼酸驚駭皆屬於火諸轉反戾水液渾濁皆屬於熱諸病水液澄徹清冷皆屬於寒諸嘔吐酸暴注下迫皆屬於熱辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或軟或堅以所利而行之調其氣使其平也君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也寒者熱之熱者寒之微者逆之甚者從之堅者削之客者除之勞者溫之結者散之留者攻之燥者濡之急者緩之散者收之損者溫之逸者行之驚者平之上之下之摩之浴之薄之劫之開之發之適事為故病之中外何如從內之外者調其內從外之內者治其外從內之外而盛於外者先調其內而後治其外從外之內而盛於內者先治其外而後調其內中外不相及則治主病夫五味入胃各歸所喜故酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常也氣增而久矢之由也方制君臣何謂也主病之謂君佐君之謂臣應臣之謂使三品所以明善惡之殊貫也調氣之方必別陰陽定其中外各守其鄉內者內治外者外治微者調之其次平之盛者奪之汗者下之寒熱溫涼衰之以屬隨其攸利謹道如法萬舉萬全氣血正平長有天命示從容論夫浮而弦者是腎不足也沉而石者是腎氣內著也怯然少氣者是水道不行形氣消索也咳嗽煩冤者是腎氣之逆也一人之氣病在一藏也若言三藏俱行不在法也今夫脈浮大虛者是脾氣之外絶去胃外歸陽明也夫二火不勝三水是以脈氣而無常也四肢解墮此脾精之不行也喘咳者是水氣並陽明也血泄者脈急血無所行也若夫以為傷肺者由失以狂也不引此類是知不明也夫傷肺者脾氣不守胃氣不清經氣不為使真藏壞決經脈傍絶五臟漏泄不衄則嘔此二者不相類也譬如天之無形地之無理白與黑相去遠矣疏五過論嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精五氣流連病有所並醫士診之不在藏府不變軀形診之而疑不知病名身體日減氣虛無精病深無氣灑灑然時驚病深者以其外耗於衛內奪於榮良工所失不知病情此亦治之一過也凡欲診病者必問飲食居處暴樂暴苦始樂後苦皆傷精氣精氣竭絶形體毀沮暴怒傷陰暴喜傷陽厥氣上行滿脈去形愚醫治之不知補瀉不知病情精華日脫邪氣乃並此治之二過也善為脈者必以比類奇恆從容知之為工而不知道此診之不足貴此治之三過也診有二常必問貴賤封君敗傷及欲侯王故貴脫勢雖不中邪精神內傷身必敗亡始富後貧雖不傷邪皮焦筋屈痿躄為攣醫不能嚴不能動神外為柔弱亂至失常病不能移則醫事不行此治之四過也凡診者必知終始有知餘緒切脈問名當合男女離絶菀結憂恐喜怒五臟空虛血氣離守工不能知何術之語嘗富大傷斬筋絶脈身體復行令澤不息故傷敗結留薄歸陽膿積寒炅粗工治之亟刺陰陽身體解散四肢轉筋死日有期醫不能明不問所發唯言死日亦為粗工此治之五過也凡此五者皆受術不通人事不明也故曰聖人之治病也必知天地陰陽四時經紀五臟六腑雌雄表裡刺灸砭石毒藥所主從容人事以明經道貴賤貧富各異品理問年少長勇怯之理審於分部知病本始八正九候診必副矣治病之道氣內為寶循求其理求之不得過在表裡守數據治無失俞理能行此術終身不殆不知俞理五臟菀熟癰發六腑診病不審是謂失常謹守此治與經相明上經下經揆度陰陽奇怕五中決以明堂審於終始可以橫行徵四失論夫經脈十二絡脈三百六十五此皆人之所明知工之所循用也所以不十全者精神不專志意不理外內相失故時疑殆診不知陰陽逆從之理此治之一失矣受師不卒妄作雜術謬言為道更名自功妄用砭石後遺身咎此治之二失也不適貧富貴賤之居坐之薄厚形之寒溫不適飲食之宜不別人之勇怯不知比類足以自亂不足以自明此治之三失也診病不問其始憂患飲食之失節起居之過度或傷於毒不先言此卒持寸口何病能中妄言作名為粗所窮此治之四失也陰陽類論所謂三陽者太陽為經三陽脈至手太陰弦浮而不沉決以度察以心合之陰陽之論所謂二陽者陽明也至手太陰弦而沉急不鼓炅至以病皆死一陽者少陽也至手太陰上連人迎弦急懸不絶此少陽之病也專陰則死三陰者六經之所主也交於太陰伏鼓不浮上空志心二陰至肺其氣歸膀胱外連脾胃一陰獨至經絶氣浮不鼓鉤而滑此六脈者乍陰乍陽交屬相併繆通五臟合於陰陽先至為主後至為客雷公曰一陽為紀三陰為母二陰為雌一陰為獨使二陽一陰陽明主病不勝一陰軟而動九竅皆沉三陽一陰太陽脈勝一陰不能止內亂五臟外為驚駭二陰二陽病在肺少陰脈沉勝肺傷脾外傷四肢二陰二陽皆交至病在腎罵詈妄行巔疾為狂二陰一陽病出於腎陰氣客遊於心腕下空竅堤閉塞不通四肢別離一陰一陽代絶此陰氣至心上下無常出入不知喉咽乾燥病在土脾二陽三陰至陰皆在陰不過陽陽氣不能止陰陰陽並絶浮為血瘕沉為膿胕陰陽皆壯下至陰陽上合昭昭下合冥冥診決死生之期遂合歲首黃帝曰冬三月之病病合於陽者至春正月脈有死徵皆歸出春冬三月之病在理已盡草與柳葉皆殺春陰陽皆絶期在孟春春三月之病日陽殺陰陽皆絶期在草乾夏三月之病至陰不過十日陰陽交期在溓水秋三月之病三陽俱起不治自己陰陽交合者立不能坐坐不能起三陽獨至期在石水二陰獨至期在盛水方盛衰論陽從左陰從右老從上少從下是以春夏歸陽為生歸秋冬為死反之則歸秋冬為生是以氣多少逆皆為厥一上不下寒厥到膝少者秋冬死老者秋冬生氣上不下頭痛巔疾求陽不得求陰不審五部隔無徵若居曠野若伏空室綿綿乎屬不滿日是以少氣之厥令人妄夢其極至迷三陽絶三陰微是為少氣是以肺氣虛則使人夢見白物見人斬血藉藉得其時則夢見兵戰秋三月也腎氣虛則使人夢見舟船溺人得其時則夢伏水中若有畏恐冬三月也肝氣虛則夢見菌香生草得其時則夢伏樹下不敢起春三月也心氣虛則夢救火陽物得其時則夢燔灼夏三月也脾氣虛則夢飲食不足得其時則夢築垣蓋屋辰戌醜末之月也此皆五臟氣虛陽氣有餘陰氣不足是以形弱氣虛死形氣有餘脈氣不足死脈氣有餘形氣不足生解精微論夫心者五臟之專精也目者其竅也華色者其榮也是以人有德也則氣和於目有亡憂知於色是以悲哀則泣下泣下水所由生水宗者積水也積水者至陰也至陰者腎之精也宗精之水所以不出者是精持之也輔之裹之故水不行也夫水之精為志火之精為神水火相感神志俱悲是以目之水生也故諺言曰心悲名曰志悲志與心精共湊於目也是以俱悲則神氣傳於心精上不傳於志而志獨悲故泣出也泣涕者腦也腦者陰也髓者骨之充也故腦滲為涕志者骨之主也是以水流而涕從之者其行類也夫涕之與泣者譬如人之兄弟急則俱死生則俱生其志以神悲是以涕泣俱出而橫行也夫人涕泣俱出而相從者所屬之類也夫泣不出者哭不悲也不泣者神不慈也神不慈則志不悲陰陽相持泣安能獨來夫志悲者惋惋則沖陰沖陰則志去目志去則神不守精精神去目涕泣出也厥則目無所見夫人厥則陽氣並於上陰氣並於下陽並於上則火獨光也陰並於下則足寒足寒則脹也夫一水不勝五火故目眥盲是以氣衝風泣下而不止夫風之中目也陽氣內守於精是火氣燔目故見風則泣下也有以比之夫火疾風生乃能雨此之類也
