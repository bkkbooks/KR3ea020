body:
  text: 卷下氣交變大論夫道者上知天文下知地理中知人事可以長久本氣位也位天者天文也位地者地理也通於人氣之變化者人事也故太過者先天不及者後天所謂治化而人應之也五運之化太過何如歲木太過風氣流行脾土受邪民病飧泄食減體重煩冤腸鳴腹支滿上應歲星甚則忽忽善怒眩胃巔疾化氣不政生氣獨治雲物飛動草木不寧甚而搖落反脅痛而吐甚衝陽絶者死不治上應太白星歲火太過炎暑流行金肺受邪民病瘧少氣咳喘血溢血泄注下嗌燥耳聾中熱肩背熱上應熒惑星甚則胸中痛脅支滿脅痛膺背肩胛間痛四臂內痛身熱骨痛而為浸淫收氣不行長氣獨明雨水霜寒上應辰星上臨少陰少陽火燔焫冰泉涸物焦槁病反譫妄狂越咳喘息鳴下甚血溢泄不已太淵絶者死不治上應熒惑星歲土太過雨濕流行腎水受邪民病腹痛清厥意不樂體重煩冤上應鎮星甚則肌肉萎足痿不收行善瘛腳下痛飲發中滿食減四肢不舉變生得位藏氣伏化氣獨治之泉湧河衍涸澤生魚風雨大治土崩潰鱗見於陸病腹滿溏泄腸鳴反下甚而太溪絶者死不治上應歲星歲金太過燥氣流行肝木受邪民病兩脅下少腹痛目赤痛背瘍耳無所聞肅殺而甚則體重煩冤胸痛引背兩脅滿且痛引少腹上應太白星甚則喘咳逆氣肩背痛尻陰股膝髀腨胻足皆病上應熒惑星收氣峻生氣下草木斂蒼干凋隕病反暴痛脅不可反側逆甚而血溢太衝絶者死不治上應太白星歲水太過寒氣流行邪害心火民病身熱煩心躁悸陰厥上下中寒譫妄心痛寒氣早至上應辰星甚則腹大脛腫咳喘寢汗出憎風大雨至埃霧朦郁上應鎮星上臨太陽雨冰雪霜不時降濕氣變物病反腹滿腸鳴溏泄食不化渴而妄冒神門絶者死不治上應熒惑辰星其不及何如歲木不及燥乃大行生氣失應草木晚榮肅殺而甚則剛木闢著悉萎蒼干上應太白星民病中清胠脅痛少腹痛腸鳴溏泄涼雨時至上應太白星其谷蒼上臨陽明生氣失政草木再榮化氣乃急上應太白鎮星其主蒼早復則炎暑流火濕性燥柔脆草木焦槁下體再生華實齊化病寒熱瘡瘍痱疹癰痤上應熒惑太白其谷白堅白露早降收殺氣行寒雨害物蟲食甘黃脾土受邪赤氣後化心氣晚治上勝肺金白氣乃屈其谷不成咳而鼽上應熒惑太白星歲火不及寒乃大行長政不用物榮而下凝慘而甚則陽氣不化乃折榮美上應辰星民病胸中痛脅支滿兩脅痛膺背肩脾間及兩臂內痛鬱冒朦昧心痛暴喑胸腹大脅下與腰背相引而痛甚則屈不能伸髓髀如別上應熒惑辰星其谷丹復則埃郁大雨且至黑乃乃辱病鶩音木溏腹滿食飲不下寒中腸鳴泄注腹痛暴攣痿痹足不任身上應鎮星辰星玄谷不成歲土不及風乃大行化氣不令草木榮茂飄揚而甚秀而不實上應歲星民病飧泄霍亂體重腹痛筋骨徭復肌肉瞤音閏酸善怒藏氣舉事蟄蟲早附咸病寒中上應歲星鎮星其谷黅復則收政嚴峻名木蒼凋胸脅暴痛下引少腹善太息蟲食甘黃氣客於脾谷乃減民食少失味蒼谷乃損上應太白歲星上臨厥陰流水不冰蟄蟲來見藏氣不用白乃不復上應歲星民乃康歲金不及炎火乃行生氣乃用長氣專勝庶物以茂燥爍以行上應熒惑星民病肩背瞀音冒重鼽嚏血便注下收氣乃後上應太白星其谷堅芒復則寒雨暴至乃零冰雹霜雪殺物陰厥且格陽反上行頭腦戶痛延及囟頂發熱上應辰星丹谷不成民病口瘡甚則心痛歲水不及濕乃大行長氣反用其化乃速暑雨數至上應鎮星民病腹滿身重濡泄寒瘍流水腰股痛發膕腨股膝不便煩冤足痿清厥腳下痛甚則跗腫藏氣不政腎氣不沖上應辰星其谷秬上臨太陰則大寒數舉蟄蟲早藏地積堅冰陽光不治民病寒疾於下甚則腹滿浮腫上應鎮星其主黅谷復則大風早發草偃木令生長不鮮面色時變筋骨並闢肉瞤瘛目視䀮䀮物疏璺音問肌肉疹發氣並鬲中痛於心腹黃氣乃損其谷不登上應歲星時也木不及春有鳴條律暢之化則秋有霧露清涼之政春有慘淒殘賊之勝則夏有炎暑燔爍之復其眚東其藏肝其病內舍胠脅外在關節火不及夏有炳明光顯之化則冬有嚴肅霜寒之政夏有慘淒凝冽之勝則不時有埃昏大雨之復其眚南其藏心其病內舍膺脅外在經絡土不及四維有埃云潤澤之化則春有鳴條鼓拆之政四維發振拉飄騰之變則秋有肅殺霖霖霪之復其眚四維其藏脾其病內舍心腹外在肌肉四支金不及夏有光顯鬱蒸之令則冬有嚴凝整肅之應夏有炎爍燔燎之變則秋有冰雹雪霜之復其眚西其藏肺其病內舍膺脅肩背外在皮毛水不及四維有湍潤埃云之化則不時有和風生髮之應四維發埃昏驟注之變則不時有飄蕩振拉音臘之復其眚北其藏腎其病內舍腰脊骨髓外在溪谷踹膝夫五運之政猶權衡也高者抑之下者舉之化者應之變者復之此生長化成收藏之理氣之常也失常則天地四塞矣故曰天地之動靜神明為之紀陰陽之往復寒暑彰其兆夫氣之動變固不常在而德化政令災變不同其候也東方生風風生木其德敷和其化生榮其政舒啓其令風其變振發其災散落南方生熱熱生火其德彰顯其化蕃茂其政明曜其令熱其變銷爍其災燔焫中央生濕濕生土其德溽蒸其化豐備其政安靜其令濕其變聚注其災霖潰西方生燥燥生金其德清潔其化緊斂其政徑切其令燥其變肅殺其災蒼隕北方生寒寒生水其德淒滄其化清謐音蜜其政凝肅其令寒其變漂冽其災冰雪霜雹是以察其動也有德有化有政有令有變有災而物由之而人應之也今夫德化政令災眚變易非常而有也承天而行之故無妄動無不應也卒然而動者氣之交變也其不應焉故曰應常不應卒其應各從其氣化病反其本得標之病治反其本得標之方其善惡也有喜有怒有憂有喪有澤有燥此象之常也必謹察之象見高下其應一也故人亦應之其德化政令之動靜損益德化政令災變不能相加也勝復盛衰不能相多也往來小大不能相過也用之升降不能相無也各從其動而復之耳德化者氣之祥政令者氣之章變易者綱之紀災眚者傷之始氣相勝者和不相勝者病重感於邪則甚也五常政大論大虛寥廓五運回薄衰盛不同損益相從平氣何如而名而紀也木曰敷和火曰升明土曰備化金曰審平水曰靜順其不及木曰委和火曰伏明土曰卑監金曰從革水曰涸流太過木曰發生火曰赫曦土曰敦阜金曰堅成水曰流衍三氣之紀其候敷和之紀木德周行陽舒陰布五化宣平其氣端其性隨其用曲直其化生榮其類草木其政發散其候溫和其令風其藏肝肝其畏清其主目其谷麻其果李其實核其應春其蟲毛其畜犬其色蒼其養筋其病裡急支滿其味酸其音角其物中堅其數八升明之紀正陽而治德施周普五化均衡其氣高其性速其用燔灼其化蕃茂其類火其政明曜其候炎暑其令熱其藏心必其畏寒其主舌其穀麥其果杏其實絡其應夏其蟲羽其畜馬其色赤其養血其病瞤瘛其味苦其音徵其物脈其數七備化之紀氣協天休德流四政五化齊修其氣平其性順其用高下其化豐滿其類土其政安靜其候溽蒸其令濕其藏脾脾其畏風其主口其谷稷其果棗其實肉其應長夏其蟲倮其畜牛其色黃其養肉其病否其味甘其音宮其物膚其數五審平之紀收而不爭殺而無犯五化宣明其氣潔其性剛其用散落其化堅斂其類金其政徑肅其候清切其令燥其藏肺肺其畏熱其主鼻其谷稻其果桃其實殼其應秋其蟲介其畜雞其色白其養皮毛其病咳其味辛其音商其物外堅其數九靜順之紀藏而勿害治而善下五化咸整其氣明其性下其用沃衍其化凝堅其類水其政流演其候凝肅其令寒其藏腎腎其畏濕其主二陰其谷豆其果栗其實濡其應冬其蟲鱗其畜彘其色黑其養骨髓其病厥其味鹹其音羽其物濡其數六故生而勿殺長而勿罰化而勿制收而勿害藏而勿抑是謂平氣委和之紀是謂勝生丁卯丁丑丁亥丁酉丁未丁巳之歲生氣不政化氣乃揚長氣自平收令乃早涼雨時降風雲並興草木晚榮蒼干凋落物秀而實膚肉內充其氣斂其用聚其動軟戾拘緩其發驚駭其藏肝其果棗李其實核殼其谷稷稻其味酸辛其色白蒼其畜犬雞其蟲毛介其主霧露淒滄其聲角商其病搖動注恐從金化也少角與判商同上角與正角同上商與正商同其病支廢癰腫瘡瘍其甘蟲邪傷肝也上宮與正宮同蕭瑟肅殺則炎赫沸騰眚於三所謂復也其主飛蠹蛆雉乃為雷霆伏明之紀是謂勝長癸酉癸未癸巳癸卯癸丑癸亥之歲長氣不宣藏氣反布收氣自政化令乃衡寒清數舉暑令乃薄承化物生生而不長成實而稚遇化已老陽氣屈伏蟄蟲早藏其氣鬱其用暴其動彰伏變易其發痛其藏心其果栗桃其實絡濡其谷豆稻其味苦其色玄丹其畜馬彘其蟲羽鱗其主冰雪霜寒其聲徵羽其病昏惑悲忘從水化也少徵與少羽同上商與正商同邪傷心也凝慘栗冽則暴雨霖霪眚於九其主驟注雷霆震驚沉霒音令淫雨卑監之紀是謂減化己巳己卯己丑己亥己酉己未之歲化氣不令生政獨彰長氣整雨乃愆收氣平風寒並同草木榮美秀而不實成而秕也其氣散其用靜定其動瘍湧分潰癰腫其發濡滯其藏脾其果李栗其實濡核其谷豆麻其味酸甘其色蒼黃其畜牛犬其蟲倮毛其氣飄怒振發其聲宮角其病留滿否寒從木化也少宮與少角同上宮與正宮同上角與正角同其病飧泄邪傷脾也振拉飄揚則蒼干散落其眚四維其主敗折虎狼清氣乃用生政乃辱從革之紀是謂折收乙丑乙亥乙酉乙未乙巳乙卯之歲收氣乃後生氣乃揚長化合德火政乃宣庶類以蕃其氣揚其用躁切其動鑑禁瞀厥其發咳喘其藏肺其果李杏其實殼絡其谷麻麥其味苦辛其色白丹其畜雞羊其蟲介羽其主明曜炎爍其聲商徵其病嚏咳鼽衄從火化也少商與少徵同上商與正商同上角與正角同邪傷肺也炎光赫然則冰雪霜雹眚於七其主鱗伏彘鼠歲氣早至乃生大寒涸流之紀是謂反陽辛未辛巳辛卯辛酉辛亥辛丑之歲藏令不舉化氣乃昌長氣宣布蟄蟲不藏土潤水泉減草木條茂榮秀滿盛其氣滯其用滲泄其動堅止其發燥槁其藏腎其果棗杏其實濡肉其谷黍稷其味甘鹹其色黅玄其畜彘牛其蟲鱗倮其主埃郁昏翳其聲羽宮其病痿厥堅下從土化也少羽與少宮同上宮與正宮同其病癃閉邪傷腎也埃昏驟雨則振拉摧拔眚於一其主毛顯狐狢變化不藏故乘危而行不速而至暴虛無德災反及之微者復微甚者復甚氣之常也發生之紀是謂啓東攴壬申壬午壬辰壬寅壬子壬戌之歲土疏泄蒼氣達陽和布化陰氣乃隨生氣淳化萬物以榮其化生其氣美其政散其令條舒其動掉眩巔疾其德鳴靡啓坼其變振拉摧拔其谷麻稻其畜雞犬其果李桃其色青黃白其味酸甘辛其象春其經足厥陰少陽其藏肝脾其蟲毛介其物中堅外堅其病怒太角與上商同上徵則其氣達其病吐利不務其德則收氣復秋氣徑切甚則肅殺清氣大至草木凋零邪乃傷肝赫曦之紀是謂蕃茂戊辰戊寅戊子戊戌戊申戊午之歲陰氣內化陽氣外榮炎暑施化物得以昌其化長其氣高其政動其令鳴顯其動炎灼妄擾其德暄暑鬱蒸其變炎烈沸騰其穀麥豆其畜羊彘其果杏栗其色赤白玄其味苦辛鹹其象憂其經手少陰太陽手厥陰少陽其藏心肺其蟲羽鱗其物脈濡其病笑虛瘡瘍血流狂妄目赤上羽與正徵同其收齊其病痓上徵而收氣後也暴烈其政藏氣乃復時見凝慘甚則雨水霜雹切寒邪傷心也敦阜之紀是謂廣化甲子甲戌甲申甲午甲辰甲寅之歲厚德清靜順長以盈至陰內實物化充成煙埃朦郁見於厚土大雨時行濕氣乃用燥政乃闢其化圓其氣豐其政靜其令周備其動濡積並畜其德柔潤重淖其變震驚飄驟崩潰其谷稷麻其畜牛犬其果棗李其色玄蒼其味甘鹹酸其象長夏其經足太陰陽明其藏脾腎其蟲倮毛其物肌核其病腹滿四支不舉大風迅至邪傷脾也堅成之紀是謂收引庚午庚辰庚寅庚子庚戌庚申之歲天氣潔地氣明陽氣隨陰治化燥行其政物以司成收氣繁布化洽不終其化成其氣消其政肅其令鋭切其動暴折瘍疰其德霧露蕭瑟其變肅殺凋零其谷稻黍其畜雞馬其果桃杏其色白青丹其味辛酸苦其象秋其經手太陰陽明其藏肺肝其蟲介羽其物殼絡其病喘喝胸憑仰息上徵與正商同其生齊其病咳政暴變則名木不榮柔脆焦首長氣斯救大火流炎爍且至蔓將槁邪傷肺也流衍之紀是謂封藏丙寅丙子丙戌丙申丙午丙辰之歲寒司物化天地嚴凝藏政以布長令不揚其化凜其氣堅其政謐其令流注其動漂泄沃湧其德凝慘寒氛其變冰雪霜雹其谷豆稷其畜彘牛其果栗棗其色黑丹黅其味鹹苦甘其象冬其經足少陰太陽其藏腎心其蟲鱗倮其物濡滿其病脹上羽而長氣不化也政過則化氣大舉而埃昏氣交大雨時降邪傷腎也故曰不恆其德則所勝來復政怕其理則所勝同化此之謂也天不足西北左寒而右涼地不滿東南右熱而左溫其故陰陽之氣高下之理太少之異也東南方陽也陽者其精降於下故右熱而左溫西北方陰也陰者其精奉於上故左寒而右涼是以地有高下氣有溫涼高者氣寒下者氣熱故適寒涼者脹之溫熱者瘡下之則脹已汗之則瘡已此腠理開閉之常太少之異耳其於壽夭陰精所奉其人壽陽精所降其人夭其病也西北之氣散而寒之東南之氣收而溫之所謂同病異治也故曰氣寒氣涼治以寒涼行水漬之氣溫氣熱治以溫熱強其內守必同其氣可使平也假者反之一州之氣生化壽夭不同高下之理地勢使然也崇高則陰氣治之汙下則陽氣治之陽勝者先天陰勝者後天此地理之常生化之道也高者其氣壽下者其氣夭地之小大異也小者小異大者大異故治病者必明天道地理陰陽更勝氣之先後人之壽夭生化之期乃可以知人之形氣矣其歲有不病而藏氣不應不用者天氣制之氣有所從也少陽司天火氣下臨肺氣上從白起金用草木眚火見燔焫革金且耗大暑以行咳嚏鼽衄鼻窒曰瘍寒熱胕腫寅申之歲風行於地塵沙飛揚心痛胃腕痛厥逆鬲不通其主暴速陽明司天燥氣下臨肝氣上從蒼起木用而立土乃眚淒滄數至木伐草萎脅痛目赤掉振鼓栗筋痿不能久立卯酉之歲暴熱至土乃暑陽氣鬱發小便變寒熱如瘧甚則心痛火行於稿流水不冰蟄蟲乃見太陽司天寒氣下臨心氣上從而火且明丹起金乃眚寒清時舉勝則水冰火氣高明心熱煩咽乾善渴鼽嚏喜悲數缺熱氣妄行寒乃復霜不時降善妄甚則心痛辰戌之歲土乃潤水豐衍寒客至沉陰化濕氣變物水飲內蓄中滿不食皮肉苛筋脈不利甚則胕腫身後癰厥陰司天風氣下臨脾氣上從而土且隆黃起水乃眚土用革體重肌肉萎食減口爽風行太虛雲物搖動日轉耳鳴巳亥之歲火從其暴地乃暑大熱消爍赤沃下蟄蟲數見流水不冰其發機速少陰司天熱氣下臨肺氣上從白起金用草木眚喘嘔寒熱嚏鼽衄鼻窒在暑流行子午之歲甚則瘡瘍燔灼金爍石流地乃燥清淒滄數至脅痛善太息肅殺行草木變太陰司天濕氣下臨腎氣上從黑起水變埃冒雲雨胸中不利陰痿氣大衰而不起不用當其時反腰椎痛動轉不便也丑未之歲厥逆地乃藏陰大寒且至蟄蟲早附心下否痛地裂冰堅少腹痛時害於食乘金則止水增味乃咸行水減也歲有胎孕不育治之不全何氣使然六氣五類有相勝制也同者盛之異者衰之此天地之道生化之常也故厥陰司天毛蟲靜羽蟲育介蟲不成乙巳丁巳己巳辛巳癸巳乙亥丁亥己亥辛亥癸亥之歲在泉毛蟲育倮蟲耗羽蟲不育少陰司天羽蟲靜介蟲育毛蟲不成甲子丙子戊子庚子壬子甲午丙午戊午庚午壬午之歲在泉羽蟲育介蟲耗不育太陰司天倮蟲靜鱗蟲育羽蟲不成乙丑丁丑巳醜辛丑癸丑乙未丁未巳未辛未癸未之歲在泉倮蟲育鱗蟲不成少陽司天羽蟲靜毛蟲育倮蟲不成甲寅丙寅戊寅庚寅壬寅甲申丙申戊申庚申壬申之歲在泉羽蟲育介蟲耗毛蟲不育陽明司天介蟲靜羽蟲育介蟲不成乙卯丁卯巳卯辛卯癸卯乙酉丁酉己酉辛酉癸酉之歲在泉介蟲育毛蟲耗羽蟲不成太陽司天鱗蟲靜倮蟲育甲辰丙辰戊辰庚辰壬辰甲戌丙戌戊戌庚戌壬戌之歲在泉鱗蟲耗倮蟲不育諸乘所不成之運則甚也故氣主有所制歲立有所生地氣制已勝天氣制勝已大制色地制形五類衰盛各隨其氣之所宜也故有胎孕不育治之不全此氣之常也所謂中根也根於外者亦五故生化之別有五氣五味五色五類五宜也根於中者命曰神機神去則機息根於外者命曰氣立氣止制化絶故各有制各有勝各有生各有成故曰不知年之所加氣之同異不足以言生化此之謂也氣始而生化氣散而有形氣布而蕃育氣終而象變其致一也然而五味所資生化有薄厚成熟有少多終始不同其故地氣制之也非天不生地不長也寒熱燥濕不同其化也故少陽在泉寒毒不生其味辛其治苦酸其谷蒼丹己亥歲陽明在泉濕毒不生其味酸其氣濕其治辛苦甘其谷丹素子午歲太陽在泉熱毒不生其味苦其治淡咸其谷黅匱丑未歲厥陰在泉清毒不生其味甘其治酸苦其谷蒼赤寅申歲其氣專其味正少陰在泉寒毒不生其味辛其治辛苦甘其谷白丹卯酉歲大陰在泉燥毒不生其味鹹其氣熱其治甘鹹其谷黅匱辰戌歲化淳則咸守氣專則辛化而俱治故曰補上下者從之治